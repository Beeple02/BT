<!-- CLIENT MANAGEMENT SPACE -->
<style>
.cms-layout{display:flex;height:100%;overflow:hidden}
.cms-sidebar{width:280px;flex-shrink:0;border-right:1px solid var(--bdr);display:flex;flex-direction:column;background:var(--bg2)}
.cms-sidebar-hd{padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.cms-sidebar-hd-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--txt3)}
.cms-client-item{padding:10px 14px;border-bottom:1px solid rgba(46,46,46,.4);cursor:pointer;transition:background .1s}
.cms-client-item:hover{background:var(--bg3)}
.cms-client-item.active{background:var(--bg3);border-left:2px solid var(--org)}
.cms-client-item .ci-name{font-size:11px;font-weight:700;color:var(--wht);margin-bottom:2px}
.cms-client-item .ci-meta{font-size:9px;color:var(--txt3)}
.cms-main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.cms-detail{flex:1;overflow-y:auto;padding:0}
.cms-tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--bdr);flex-shrink:0}
.cms-tab{padding:6px 16px;font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--txt2);cursor:pointer;border-right:1px solid var(--bdr)}
.cms-tab:hover{color:var(--wht)}
.cms-tab.on{color:var(--org);border-bottom:2px solid var(--org);background:var(--bg2)}
.cms-panel{display:none;padding:16px;overflow-y:auto;flex:1}
.cms-panel.on{display:block}
.risk-badge{display:inline-block;padding:2px 8px;font-size:8px;font-weight:700;letter-spacing:1px}
.risk-conservative{background:rgba(0,200,83,.15);color:#00c853}
.risk-moderate{background:rgba(255,214,0,.15);color:#ffd600}
.risk-aggressive{background:rgba(244,67,54,.15);color:#f44336}
.field-row{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.field-row label{font-size:9px;color:var(--txt3);letter-spacing:1.5px}
.field-row input,.field-row select,.field-row textarea{background:var(--bg);border:1px solid var(--bdr2);color:var(--wht);font-family:var(--font);font-size:11px;padding:5px 8px;outline:none;width:100%}
.field-row input:focus,.field-row textarea:focus{border-color:var(--org)}
.mandate-row{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(46,46,46,.3);font-size:10px}
.mandate-row label{color:var(--txt2);flex:1}
.mandate-row input[type=number],.mandate-row input[type=text]{width:80px;background:var(--bg);border:1px solid var(--bdr2);color:var(--wht);font-family:var(--font);font-size:10px;padding:3px 6px;outline:none}
.mandate-row input[type=checkbox]{accent-color:var(--org)}
.portal-link-box{background:var(--bg3);border:1px solid var(--bdr);padding:10px 14px;font-size:10px;font-family:'Courier New',monospace;color:var(--cyn);word-break:break-all;margin:8px 0}
.note-item{padding:8px 0;border-bottom:1px solid rgba(46,46,46,.3);font-size:10px}
.note-item .note-ts{font-size:8px;color:var(--txt3);margin-bottom:3px}
.note-item .note-author{color:var(--org);font-size:8px;margin-right:6px}
</style>

<div class="cms-layout" id="cms-inner">
  <!-- Sidebar: client list -->
  <div class="cms-sidebar">
    <div class="cms-sidebar-hd">
      <span class="cms-sidebar-hd-title">CLIENTS</span>
      <button class="btn buy btn-xs" onclick="CMS_newClient()">+ NEW</button>
    </div>
    <div class="scroll" id="cms-client-list" style="flex:1">
      <div style="padding:20px;color:var(--txt3);font-size:10px;text-align:center">Loading…</div>
    </div>
  </div>

  <!-- Main: detail / empty state -->
  <div class="cms-main" id="cms-main-area">
    <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--txt3);font-size:11px" id="cms-empty">
      Select a client or create a new one.
    </div>
  </div>
</div>

<!-- New Client Modal -->
<div id="cms-new-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:3000;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--org);width:440px;font-size:11px">
    <div style="padding:10px 14px;background:var(--bg3);border-bottom:1px solid var(--bdr);font-size:10px;font-weight:700;letter-spacing:2px;color:var(--org);display:flex;justify-content:space-between">
      NEW CLIENT <span style="cursor:pointer;color:var(--txt2)" onclick="CMS_hideNewModal()">✕</span>
    </div>
    <div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="field-row" style="grid-column:1/-1"><label>CLIENT NAME *</label><input id="nc-name" placeholder="e.g. Nexalin Capital"></div>
      <div class="field-row"><label>DISCORD @</label><input id="nc-discord" placeholder="e.g. nexalin#0001"></div>
      <div class="field-row"><label>IGN</label><input id="nc-ign" placeholder="in-game name"></div>
      <div class="field-row"><label>RISK PROFILE</label>
        <select id="nc-risk"><option value="conservative">Conservative</option><option value="moderate" selected>Moderate</option><option value="aggressive">Aggressive</option></select>
      </div>
      <div class="field-row"><label>AUM TIER</label>
        <select id="nc-tier"><option value="retail">&lt;$100K</option><option value="hnw">$100K–$1M</option><option value="uhnw" selected>&gt;$1M</option><option value="institutional">Institutional</option></select>
      </div>
      <div class="field-row"><label>ONBOARDING DATE</label><input id="nc-onboard" type="date"></div>
      <div class="field-row"><label>JURISDICTION</label><input id="nc-jurisdiction" placeholder="e.g. Redmont, Alexandria"></div>
      <div class="field-row" style="grid-column:1/-1"><label>NOTES</label><textarea id="nc-notes" rows="2" placeholder="Client overview, relationship notes…"></textarea></div>
    </div>
    <div style="padding:10px 14px;background:var(--bg3);border-top:1px solid var(--bdr);display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="CMS_hideNewModal()">CANCEL</button>
      <button class="btn buy" onclick="CMS_createClient()">CREATE CLIENT →</button>
    </div>
  </div>
</div>
