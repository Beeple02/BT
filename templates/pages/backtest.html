<!-- F5: BACKTEST v2 — Single Ticker -->
<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">

<!-- ── Tab bar (single tab for now) ── -->
<div style="display:flex;background:var(--bg3);border-bottom:1px solid var(--bdr);flex-shrink:0">
  <span class="bt-tab active" data-t="single">SINGLE TICKER</span>
</div>

<!-- ── Controls ── -->
<div class="frow" id="bt-controls">
  <div class="ff">
    <label>TICKER</label>
    <select id="bt-tk" style="min-width:160px"><option value="">SELECT</option></select>
  </div>
  <div class="ff">
    <label>DAYS</label>
    <select id="bt-days">
      <option value="30">30D</option>
      <option value="60">60D</option>
      <option value="90" selected>90D</option>
      <option value="180">180D</option>
      <option value="365">365D</option>
    </select>
  </div>
  <div class="ff">
    <label>STRATEGY</label>
    <select id="bt-str" onchange="btParamShow()">
      <option value="buy_hold">BUY &amp; HOLD</option>
      <option value="sma_cross">SMA CROSS</option>
      <option value="rsi">RSI REVERSAL</option>
      <option value="macd">MACD</option>
      <option value="bb_reversal">BB REVERSAL</option>
    </select>
  </div>

  <!-- SMA params -->
  <div id="btp-sma" class="bt-pg" style="display:none">
    <div class="ff"><label>FAST</label><input type="number" id="btp-sf" value="5"  style="width:46px"></div>
    <div class="ff"><label>SLOW</label><input type="number" id="btp-ss" value="20" style="width:46px"></div>
  </div>
  <!-- RSI params -->
  <div id="btp-rsi" class="bt-pg" style="display:none">
    <div class="ff"><label>PERIOD</label><input type="number" id="btp-rp" value="14" style="width:46px"></div>
    <div class="ff"><label>OB</label>    <input type="number" id="btp-ob" value="70" style="width:46px"></div>
    <div class="ff"><label>OS</label>    <input type="number" id="btp-os" value="30" style="width:46px"></div>
  </div>
  <!-- MACD params -->
  <div id="btp-macd" class="bt-pg" style="display:none">
    <div class="ff"><label>FAST</label>   <input type="number" id="btp-mf" value="12" style="width:46px"></div>
    <div class="ff"><label>SLOW</label>   <input type="number" id="btp-ms" value="26" style="width:46px"></div>
    <div class="ff"><label>SIGNAL</label> <input type="number" id="btp-mg" value="9"  style="width:46px"></div>
  </div>

  <!-- SL/TP (all strategies) -->
  <div class="ff"><label>STOP%</label><input type="number" id="btp-sl" value="0" step="0.5" style="width:50px" placeholder="off"></div>
  <div class="ff"><label>TP%</label>  <input type="number" id="btp-tp" value="0" step="0.5" style="width:50px" placeholder="off"></div>

  <button class="btn on" id="bt-run-btn" onclick="runBT()">RUN</button>
</div>

<!-- ── Metrics strip ── -->
<div class="sstrip" id="bt-strip" style="display:none">
  <div class="ss"><div class="ss-l">RETURN</div>    <div class="ss-v" id="bm-ret">—</div></div>
  <div class="ss"><div class="ss-l">BENCHMARK</div> <div class="ss-v" id="bm-bh">—</div></div>
  <div class="ss"><div class="ss-l">ALPHA</div>     <div class="ss-v" id="bm-alpha">—</div></div>
  <div class="ss"><div class="ss-l">MAX DD</div>    <div class="ss-v dn" id="bm-dd">—</div></div>
  <div class="ss"><div class="ss-l">SHARPE</div>    <div class="ss-v" id="bm-sharpe">—</div></div>
  <div class="ss"><div class="ss-l">CALMAR</div>    <div class="ss-v" id="bm-calmar">—</div></div>
  <div class="ss"><div class="ss-l">TRADES</div>    <div class="ss-v" id="bm-trades">—</div></div>
  <div class="ss"><div class="ss-l">WIN RATE</div>  <div class="ss-v" id="bm-wr">—</div></div>
  <div class="ss"><div class="ss-l">FINAL EQ</div>  <div class="ss-v" id="bm-eq">—</div></div>
</div>

<!-- ── Main panels ── -->
<div class="wrow" style="flex:1;min-height:0">
  <!-- Equity curve -->
  <div class="win" style="flex:1;border-right:0">
    <div class="wbar">
      <div class="wbar-l">
        <span class="wnum">1</span>
        <span class="wtitle">EQUITY CURVE</span>
        <span class="wsub" id="bt-chart-sub"></span>
      </div>
      <div class="wbar-r" style="font-size:9px;color:var(--txt3)">
        <span style="color:var(--org)">—</span> Strategy &nbsp;
        <span style="color:#555">- -</span> Buy&amp;Hold
      </div>
    </div>
    <div class="chart-wrap"><canvas id="bt-eq-c"></canvas></div>
  </div>

  <!-- Trade log -->
  <div class="win" style="flex:1">
    <div class="wbar">
      <div class="wbar-l">
        <span class="wnum">2</span>
        <span class="wtitle">TRADE LOG</span>
      </div>
    </div>
    <div class="scroll" id="bt-log" style="height:100%">
      <div class="loading">RUN A BACKTEST</div>
    </div>
  </div>
</div>

</div><!-- /outer flex -->

<style>
.bt-tab {
  padding: 4px 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  color: var(--txt3);
  border-right: 1px solid var(--bdr);
  border-bottom: 2px solid transparent;
}
.bt-tab:hover  { color: var(--txt); background: var(--bg4); }
.bt-tab.active { color: var(--wht); border-bottom-color: var(--org); background: var(--bg4); }
.bt-pg { display: flex; gap: 6px; }
</style>

<script>
(function () {
  let _btChart = null;

  /* ── Lifecycle ─────────────────────────────────────────────────────────── */
  window.PAGE_bt_onShow = function () {
    populateSel('bt-tk');
  };

  /* ── Strategy param visibility ─────────────────────────────────────────── */
  window.btParamShow = function () {
    ['sma','rsi','macd'].forEach(k => {
      const el = document.getElementById('btp-' + k);
      if (el) el.style.display = 'none';
    });
    const strat = document.getElementById('bt-str').value;
    const map = { sma_cross: 'sma', rsi: 'rsi', macd: 'macd' };
    if (map[strat]) document.getElementById('btp-' + map[strat]).style.display = 'flex';
  };

  /* ── Collect strategy params ────────────────────────────────────────────── */
  function getParams() {
    const strat = document.getElementById('bt-str').value;
    const p = {
      stop_loss_pct:   +document.getElementById('btp-sl').value || 0,
      take_profit_pct: +document.getElementById('btp-tp').value || 0,
    };
    if (strat === 'sma_cross') {
      p.fast = +document.getElementById('btp-sf').value;
      p.slow = +document.getElementById('btp-ss').value;
    }
    if (strat === 'rsi') {
      p.rsi_period  = +document.getElementById('btp-rp').value;
      p.overbought  = +document.getElementById('btp-ob').value;
      p.oversold    = +document.getElementById('btp-os').value;
    }
    if (strat === 'macd') {
      p.fast   = +document.getElementById('btp-mf').value;
      p.slow   = +document.getElementById('btp-ms').value;
      p.signal = +document.getElementById('btp-mg').value;
    }
    return p;
  }

  /* ── Main run ───────────────────────────────────────────────────────────── */
  window.runBT = async function () {
    const ticker = document.getElementById('bt-tk').value;
    if (!ticker) return;

    const strat = document.getElementById('bt-str').value;
    const days  = +document.getElementById('bt-days').value;

    const btn = document.getElementById('bt-run-btn');
    btn.textContent = '…';
    btn.disabled = true;
    document.getElementById('bt-log').innerHTML = '<div class="loading">RUNNING…</div>';

    const r = await apiPost('/api/backtest', {
      ticker,
      days,
      strategy: strat,
      params: getParams(),
    });

    btn.textContent = 'RUN';
    btn.disabled = false;

    if (!r.ok) {
      document.getElementById('bt-log').innerHTML =
        `<div class="alert err">${r.d?.detail || 'Error'}</div>`;
      return;
    }

    const d = r.d;
    const m = d.metrics;

    /* ── Metrics strip ─────────────────────────────────────────────────── */
    document.getElementById('bt-strip').style.display = 'flex';
    document.getElementById('bt-chart-sub').textContent =
      ` — ${ticker} · ${strat.replace(/_/g,' ').toUpperCase()} · ${days}D`;

    function setMetric(id, val, isPercent) {
      const el = document.getElementById(id);
      const display = isPercent
        ? (val >= 0 ? '+' : '') + val + '%'
        : val;
      el.textContent = display;
      if (typeof val === 'number') el.style.color = gc(val);
    }

    setMetric('bm-ret',    m.total_return_pct,    true);
    setMetric('bm-bh',     m.benchmark_return_pct, true);
    setMetric('bm-alpha',  m.alpha_pct,            true);
    document.getElementById('bm-dd').textContent = '-' + m.max_drawdown_pct + '%';
    setMetric('bm-sharpe', m.sharpe_ratio,         false);
    document.getElementById('bm-calmar').textContent = m.calmar_ratio;
    document.getElementById('bm-trades').textContent = m.num_trades;
    document.getElementById('bm-wr').textContent     = m.win_rate + '%';
    document.getElementById('bm-eq').textContent     = f(m.final_equity);

    /* ── Chart ─────────────────────────────────────────────────────────── */
    if (_btChart) { _btChart.destroy(); _btChart = null; }

    _btChart = new Chart(document.getElementById('bt-eq-c'), {
      type: 'line',
      data: {
        labels: d.dates,
        datasets: [
          {
            label: 'Strategy',
            data: d.equity_curve,
            borderColor: '#cc9900',
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
            tension: 0.2,
          },
          {
            label: 'Buy & Hold',
            data: d.bh_curve,
            borderColor: '#444',
            borderWidth: 1.5,
            borderDash: [5, 4],
            pointRadius: 0,
            fill: false,
            tension: 0.2,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { ...TT },
        },
        scales: {
          x: {
            grid: { color: '#1a1a1a' },
            ticks: { maxTicksLimit: 8, maxRotation: 0, color: '#444' },
          },
          y: {
            grid: { color: '#1a1a1a' },
            position: 'right',
            ticks: { color: '#444' },
          },
        },
      },
    });

    /* ── Trade log ─────────────────────────────────────────────────────── */
    if (!d.trades.length) {
      document.getElementById('bt-log').innerHTML = '<div class="loading">NO TRADES</div>';
      return;
    }

    const actionColor = a =>
      a === 'BUY'  ? 'var(--up)'  :
      a === 'SELL' ? 'var(--dn)'  :
      a === 'STOP' ? 'var(--dn)'  :
      'var(--yel)';

    const rows = d.trades.map((t, i) => `
      <tr>
        <td class="dim">${i + 1}</td>
        <td>${t.date}</td>
        <td style="color:${actionColor(t.action)};font-weight:700">${t.action}</td>
        <td class="r wht">${f(t.price)}</td>
        <td class="r dim">${t.qty.toLocaleString()}</td>
        <td class="r">${f(t.value)}</td>
      </tr>`).join('');

    document.getElementById('bt-log').innerHTML = `
      <table class="dt">
        <thead>
          <tr>
            <th>#</th><th>DATE</th><th>ACTION</th>
            <th class="r">PRICE</th><th class="r">QTY</th><th class="r">VALUE</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  };

})();
</script>
