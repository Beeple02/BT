<style>
.corr-cell{width:36px;height:24px;display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;border-radius:2px}
</style>
<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
<div class="frow">
  <div class="ff"><label>TICKERS (2–6)</label>
    <div id="cmp-chips" style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;min-width:180px">
      <span style="font-size:9px;color:var(--txt3)">Add tickers:</span>
    </div>
  </div>
  <div class="ff"><label>ADD TICKER</label>
    <select id="cmp-add-sel" onchange="cmpAddTicker(this.value);this.value=''">
      <option value="">SELECT…</option>
    </select>
  </div>
  <div class="ff"><label>PERIOD</label>
    <select id="cmp-days" onchange="loadCompare()">
      <option value="7">7D</option><option value="14">14D</option><option value="30">30D</option><option value="60">60D</option><option value="90" selected>90D</option>
    </select>
  </div>
  <div class="ff"><label>CORR WINDOW</label>
    <select id="cmp-win" onchange="loadCompare()">
      <option value="7">7D</option><option value="10">10D</option><option value="14" selected>14D</option><option value="21">21D</option>
    </select>
  </div>
  <div class="ff"><label>CHART MODE</label>
    <select id="cmp-mode" onchange="rebuildNormChart()">
      <option value="raw">RAW PRICE</option>
      <option value="norm">REBASED 100</option>

    </select>
  </div>
  <button class="btn on" onclick="loadCompare()">▶ ANALYSE</button>
  <button class="btn" onclick="cmpClear()">CLEAR</button>
  <button class="btn" onclick="cmpAutoAll()">ALL TICKERS</button>
  <span id="cmp-status" style="align-self:flex-end;font-size:9px;color:var(--txt3);padding-bottom:4px"></span>
</div>

<div class="wrow" style="flex:1">
  <div class="wcol" style="flex:1">
    <div class="win" style="flex:2;border-bottom:0;border-right:0">
      <div class="wbar">
        <div class="wbar-l"><span class="wnum">1</span><span class="wtitle" id="cmp-chart1-title">PRICE CHART</span></div>
      </div>
      <div class="chart-wrap"><canvas id="cmp-norm-c"></canvas></div>
    </div>
    <div class="win" style="flex:1;border-right:0;border-top:0;border-bottom:0">
      <div class="wbar">
        <div class="wbar-l"><span class="wnum">2</span><span class="wtitle">ROLLING CORRELATION</span><span class="wsub" id="cmp-corr-sub"></span></div>
        <div class="wbar-r" style="font-size:9px;color:var(--txt3)">2-ticker mode</div>
      </div>
      <div class="chart-wrap"><canvas id="cmp-corr-c"></canvas></div>
    </div>
    <div class="win" style="flex:1;border-right:0;border-top:0">
      <div class="wbar">
        <div class="wbar-l"><span class="wnum">3</span><span class="wtitle">SPREAD Z-SCORE</span><span class="wsub" id="cmp-spread-sub"></span></div>
        <div class="wbar-r" style="font-size:9px;color:var(--txt3)">Pairs signal</div>
      </div>
      <div class="chart-wrap"><canvas id="cmp-spread-c"></canvas></div>
    </div>
  </div>

  <div class="wcol" style="width:300px;flex:none">
    <div class="win" style="flex:1;border-bottom:0">
      <div class="wbar"><div class="wbar-l"><span class="wnum">4</span><span class="wtitle">CORRELATION MATRIX</span></div></div>
      <div style="padding:8px;overflow:auto;flex:1" id="cmp-matrix-wrap"><div class="loading">Run analysis</div></div>
    </div>
    <div class="win" style="flex:2;border-top:0;border-bottom:0">
      <div class="wbar"><div class="wbar-l"><span class="wnum">5</span><span class="wtitle">COMPARISON STATS</span></div></div>
      <div class="scroll">
        <table class="dt">
          <thead><tr>
            <th>TICKER</th><th class="r">RETURN</th><th class="r">VOL</th><th class="r">SHARPE</th>
            <th class="r">MAX DD</th><th class="r">SPREAD%</th><th class="r">LIQ</th>
          </tr></thead>
          <tbody id="cmp-stats-body"><tr><td colspan="7" class="loading">Add 2+ tickers</td></tr></tbody>
        </table>
      </div>
    </div>
    <div class="win" style="flex:1;min-min-min-height:40px;border-top:0">
      <div class="wbar">
        <div class="wbar-l"><span class="wnum">6</span><span class="wtitle" id="cmp-p6-title">PERFORMANCE RANK</span></div>
        <div class="wbar-r" id="cmp-p6-sub" style="font-size:9px;color:var(--txt3)"></div>
      </div>
      <!-- Pairs signal (2-ticker mode) -->
      <div id="cmp-pairs-detail" style="padding:8px;font-size:10px;display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;display:none">
        <span style="color:var(--txt3);font-size:9px;grid-column:span 2">Select exactly 2 tickers for pairs analysis</span>
      </div>
      <!-- Performance rank (always shown) -->
      <div id="cmp-perf-rank" style="overflow-y:auto;flex:1;font-size:10px"></div>
    </div>
  </div>
</div>
</div>

<script>
(function(){
const COLORS=['#ffd600','#00e5ff','#00c853','#e040fb','#ff8c00','#f44336'];
let _tickers=[], _cNorm=null, _cCorr=null, _cSpread=null, _statsData=[];
let _filledMaps=[], _useDates=[];

window.PAGE_cmp_onShow=function(){
  populateSel('cmp-add-sel');
  if(_tickers.length>=2){ loadCompare(); return; }
  // Restore from sessionStorage if available
  if(_tickers.length===0){
    try{
      const saved=sessionStorage.getItem('bb_cmp_tickers');
      if(saved){ const ts=JSON.parse(saved); if(Array.isArray(ts)&&ts.length>=2){ _tickers=ts; renderChips(); loadCompare(); return; } }
    }catch(e){}
  }
  // Default tickers
  if(BB.secs && BB.secs.length>=2 && _tickers.length===0){
    ['BB','NTR','RTG'].forEach(t=>{ if(BB.secs.find(s=>s.ticker===t) && !_tickers.includes(t)) _tickers.push(t); });
    renderChips();
    loadCompare();
  }
};

window.cmpAddTicker=function(t){
  if(!t||_tickers.includes(t)) return;
  if(_tickers.length>=6){ document.getElementById('cmp-status').textContent='MAX 6'; return; }
  _tickers.push(t); renderChips();
  if(_tickers.length>=2) loadCompare();
};
window.cmpClear=function(){ _tickers=[]; _statsData=[]; renderChips(); document.getElementById('cmp-status').textContent='Cleared'; };
window.cmpAutoAll=function(){
  _tickers=[];
  BB.secs.slice(0,6).forEach(s=>{ if(!_tickers.includes(s.ticker)) _tickers.push(s.ticker); });
  renderChips();
  if(_tickers.length>=2) loadCompare();
};
window.cmpRemove=function(t){ _tickers=_tickers.filter(x=>x!==t); renderChips(); if(_tickers.length>=2) loadCompare(); };

function renderChips(){
  document.getElementById('cmp-chips').innerHTML=_tickers.length
    ?_tickers.map((t,i)=>`<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid ${COLORS[i]};color:${COLORS[i]};font-size:9px;font-weight:700">${t}<span style="cursor:pointer;opacity:.5;margin-left:3px" onclick="cmpRemove('${t}')">✕</span></span>`).join('')
    :'<span style="font-size:9px;color:var(--txt3)">Add tickers:</span>';
}

window.rebuildNormChart=function(){
  if(!_statsData.length) return;
  buildPriceChart(document.getElementById('cmp-mode').value);
  if(_tickers.length===2) buildCorrAndSpread(+document.getElementById('cmp-win').value);
};

function buildPriceChart(mode){
  _cNorm=dc(_cNorm);
  if(!_statsData.length) return;

  // Today's date string YYYY-MM-DD
  const todayStr=new Date().toISOString().slice(0,10);

  // Build per-ticker byDate maps, then forward-fill each series to today
  // Forward-fill: if a date has no candle, carry the last known close forward
  // This handles illiquid securities that go days/weeks without a trade
  const filledMaps=_statsData.map(sd=>{
    // Get all candle dates for this ticker, sorted
    const sorted=[...sd.candles].sort((a,b)=>a.date.localeCompare(b.date));
    if(!sorted.length) return {};
    // Build date→close from actual candles
    const byDate=Object.fromEntries(sorted.map(c=>[c.date,c.close]));
    // Extend: generate every calendar date from first candle to today
    const filled={};
    const start=sorted[0].date;
    const cur=new Date(start+'T12:00:00Z');
    const end=new Date(todayStr+'T12:00:00Z');
    let lastClose=sorted[0].close;
    while(cur<=end){
      const ds=cur.toISOString().slice(0,10);
      if(byDate[ds]!=null) lastClose=byDate[ds];
      // Only include the date if it's within the ticker's actual data range OR it's today
      // (don't pad dates before the first candle)
      if(ds>=start) filled[ds]=lastClose;
      cur.setUTCDate(cur.getUTCDate()+1);
    }
    return filled;
  });

  // Build union of all dates across all filled maps, sorted
  const allDatesSet=new Set();
  filledMaps.forEach(m=>Object.keys(m).forEach(d=>allDatesSet.add(d)));
  const allDatesSorted=[...allDatesSet].sort();

  // Intersection: dates where every ticker has data (after forward-fill, this is almost always all dates)
  const commonDates=allDatesSorted.filter(d=>filledMaps.every(m=>m[d]!=null));

  // Use intersection if large enough, else union (forward-fill means union is nearly always fine)
  const useDates=commonDates.length>=2?commonDates:allDatesSorted;

  // Auto-switch raw→norm when price scales differ >3x
  let effectiveMode=mode;
  if(mode==='raw'&&_statsData.length>=2){
    const firstPrices=_statsData.map(sd=>{const c=sd.candles.find(c=>c.close>0);return c?c.close:null;}).filter(Boolean);
    if(firstPrices.length>=2){
      const ratio=Math.max(...firstPrices)/Math.min(...firstPrices);
      if(ratio>3) effectiveMode='norm';
    }
  }
  const titles={raw:'RAW PRICE',norm:'NORMALISED (rebased 100)',pct:'% RETURN FROM START'};
  const autoNote=effectiveMode!==mode?' (auto-normalised — prices differ >3x)':'';
  document.getElementById('cmp-chart1-title').textContent=(titles[effectiveMode]||'PRICE CHART')+autoNote;

  const datasets=_statsData.map((sd,i)=>{
    const fm=filledMaps[i];
    const cs=useDates.map(d=>fm[d]??null);
    const firstVal=cs.find(v=>v!=null)||1;
    let data=cs;
    if(effectiveMode==='norm'){ data=cs.map(v=>v!=null?+(v/firstVal*100).toFixed(4):null); }
    else if(effectiveMode==='pct'){ data=cs.map(v=>v!=null?+((v/firstVal-1)*100).toFixed(4):null); }
    // spanGaps:true because forward-fill means there are no meaningful gaps anymore
    return{label:sd.ticker,data,borderColor:COLORS[i],borderWidth:1.5,pointRadius:0,fill:false,tension:.2,spanGaps:true};
  });

  _filledMaps=filledMaps;
  _useDates=useDates;

  _cNorm=new Chart(document.getElementById('cmp-norm-c'),{type:'line',
    data:{labels:useDates,datasets},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      onHover:(evt, active)=>{
        if(!active||!active.length) return;
        const idx=active[0].index;
        const date=useDates[idx]||'';
        const bar=document.getElementById('cmd-st'); if(!bar) return;
        const vals=datasets.map(ds=>{
          const v=ds.data[idx];
          if(v==null) return null;
          return `${ds.label} ${effectiveMode==='raw'?'$'+f(v,4):v.toFixed(2)+(effectiveMode==='pct'?'%':'')}`;
        }).filter(Boolean);
        bar.textContent=date+'  ·  '+vals.join('  ·  ');
        bar.style.color='var(--txt3)';
      },
      plugins:{legend:{display:true,position:'top',labels:{color:'#888',font:{size:9},boxWidth:10,padding:6}},
        tooltip:{...TT,callbacks:{label:c=>` ${c.dataset.label}: ${mode==='raw'?f(c.parsed.y,4):c.parsed.y.toFixed(2)+(mode==='pct'?' %':'')}`}}},
      scales:{
        x:{grid:{color:'#111'},ticks:{maxTicksLimit:8,color:'#444',font:{size:9}}},
        y:{grid:{color:'#1a1a1a'},position:'right',ticks:{color:'#444'}}
      }}});
}

window.loadCompare=async function(){
  if(_tickers.length<2){ document.getElementById('cmp-status').textContent='Need 2+ tickers'; return; }
  const days=+document.getElementById('cmp-days').value;
  const win=+document.getElementById('cmp-win').value;
  const mode=document.getElementById('cmp-mode').value;
  // Persist ticker set to sessionStorage
  try{ sessionStorage.setItem('bb_cmp_tickers', JSON.stringify(_tickers)); }catch(e){}
  document.getElementById('cmp-status').textContent='Loading…';

  const [statsArr,liqArr]=await Promise.all([
    Promise.all(_tickers.map(t=>api(`/api/ticker_stats/${t}?days=${days}`))),
    Promise.all(_tickers.map(t=>api(`/api/liquidity/${t}`)))
  ]);

  _statsData=_tickers.map((t,i)=>({ticker:t,candles:statsArr[i].ok?statsArr[i].d.candles:[]})).filter(sd=>sd.candles.length);
  buildPriceChart(mode);

  // Destroy old corr/spread charts
  _cCorr=dc(_cCorr); _cSpread=dc(_cSpread);
  document.getElementById('cmp-corr-sub').textContent='';
  document.getElementById('cmp-spread-sub').textContent='';

  if(_tickers.length===2){
    // Compute rolling correlation + spread Z-score client-side using forward-filled data
    // This always works regardless of how sparse the raw candles are
    buildCorrAndSpread(win);
  } else {
    // Multi-ticker mode: show performance rank
    document.getElementById('cmp-pairs-detail').style.display='none';
    document.getElementById('cmp-perf-rank').style.display='block';
    document.getElementById('cmp-p6-title').textContent='PERFORMANCE RANK';
    document.getElementById('cmp-p6-sub').textContent=`${_tickers.length} tickers`;
  }
  // Always render perf rank for all modes
  renderPerfRank();

  // Correlation matrix
  const corrR=await api(`/api/correlation_matrix?days=${days}`);
  if(corrR.ok && corrR.d.tickers && corrR.d.tickers.length){
    const cm=corrR.d;
    const pairs=_tickers.map(t=>{const i=cm.tickers.indexOf(t);return i>=0?{ticker:t,i}:null;}).filter(Boolean);
    if(pairs.length>=2){
      let html=`<table style="border-collapse:collapse"><thead><tr><th></th>${pairs.map(p=>`<th style="padding:2px 4px;font-size:9px;color:var(--txt3);font-weight:700">${p.ticker}</th>`).join('')}</tr></thead><tbody>`;
      pairs.forEach(p1=>{
        html+=`<tr><td style="padding:2px 4px;font-size:9px;color:var(--txt3);font-weight:700;white-space:nowrap">${p1.ticker}</td>`;
        pairs.forEach(p2=>{
          const val=(cm.matrix[p1.i]||[])[p2.i]??0;
          const abs=Math.abs(val);
          const isDiag=p1.i===p2.i;
          const bg=isDiag?'#2a2a2a':val>0.7?`rgba(244,67,54,${.3+abs*.6})`:val>0.3?`rgba(255,214,0,${.2+abs*.5})`:val<-0.5?`rgba(0,229,255,${.2+abs*.5})`:'rgba(60,60,60,.4)';
          html+=`<td><div class="corr-cell" style="background:${bg};color:${abs>0.3||isDiag?'#fff':'#888'}">${val.toFixed(2)}</div></td>`;
        });
        html+='</tr>';
      });
      html+='</tbody></table>';
      html+=`<div style="font-size:9px;color:var(--txt3);margin-top:8px">Exchange avg corr: <span class="wht">${cm.avg_corr!=null?cm.avg_corr.toFixed(3):'—'}</span></div>`;
      document.getElementById('cmp-matrix-wrap').innerHTML=html;
    } else {
      document.getElementById('cmp-matrix-wrap').innerHTML='<div style="padding:8px;font-size:9px;color:var(--txt3)">Tickers not found in correlation matrix</div>';
    }
  }

  // Stats table
  const tbody=document.getElementById('cmp-stats-body'); tbody.innerHTML='';
  _tickers.forEach((t,i)=>{
    const sd=statsArr[i]; const ld=liqArr[i];
    if(!sd.ok) return;
    const ret=sd.d.price_chg_pct, vol=sd.d.volatility_ann_pct, sh=sd.d.sharpe, dd=sd.d.max_drawdown_pct;
    const spread=ld.ok?ld.d.spread_pct:null, liq=ld.ok?(ld.d.total_bid_qty||0)+(ld.d.total_ask_qty||0):null;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><strong style="color:${COLORS[i]}">${t}</strong></td>
      <td class="r ${ret>=0?'up':'dn'}">${fp(ret)}</td>
      <td class="r yel">${vol!=null?vol.toFixed(1)+'%':'—'}</td>
      <td class="r ${sh>=1?'up':sh>0?'yel':'dn'}">${f(sh,2)}</td>
      <td class="r dn">-${dd}%</td>
      <td class="r ${spread!=null?(spread<0.1?'up':spread<0.5?'yel':'dn'):'dim'}">${spread!=null?spread.toFixed(3)+'%':'—'}</td>
      <td class="r dim">${liq!=null?fk(liq):'—'}</td>`;
    tr.onclick=()=>{sw('tkr');setTimeout(()=>PAGE_tkr_load&&PAGE_tkr_load(t),200)};
    tbody.appendChild(tr);
  });
  document.getElementById('cmp-status').textContent=`${_tickers.length} tickers · ${days}D`;
};

// ── Client-side rolling correlation + spread Z using forward-filled prices ──
function buildCorrAndSpread(win){
  _cCorr=dc(_cCorr); _cSpread=dc(_cSpread);
  if(_filledMaps.length<2||_useDates.length<2) return;

  const fm0=_filledMaps[0], fm1=_filledMaps[1];
  const dates=_useDates;
  const p0=dates.map(d=>fm0[d]??null);
  const p1=dates.map(d=>fm1[d]??null);

  // Rolling window Pearson correlation
  function rollingCorr(a,b,w){
    const out=[];
    for(let i=0;i<a.length;i++){
      if(i<w-1){out.push(null);continue;}
      const sa=a.slice(i-w+1,i+1), sb=b.slice(i-w+1,i+1);
      const va=sa.filter(v=>v!=null), vb=sb.filter(v=>v!=null);
      if(va.length<3){out.push(null);continue;}
      const ma=va.reduce((s,v)=>s+v,0)/va.length;
      const mb=vb.reduce((s,v)=>s+v,0)/vb.length;
      let num=0,da2=0,db2=0;
      for(let j=0;j<sa.length;j++){
        if(sa[j]==null||sb[j]==null) continue;
        num+=(sa[j]-ma)*(sb[j]-mb);
        da2+=(sa[j]-ma)**2;
        db2+=(sb[j]-mb)**2;
      }
      const denom=Math.sqrt(da2*db2);
      out.push(denom>0?+(num/denom).toFixed(4):null);
    }
    return out;
  }

  // Log-price spread and rolling Z-score
  function spreadZ(a,b,w){
    const sp=a.map((v,i)=>v&&b[i]?Math.log(v/b[i]):null);
    const zout=[];
    for(let i=0;i<sp.length;i++){
      if(i<w-1){zout.push(null);continue;}
      const window=sp.slice(i-w+1,i+1).filter(v=>v!=null);
      if(window.length<3){zout.push(null);continue;}
      const mu=window.reduce((s,v)=>s+v,0)/window.length;
      const sigma=Math.sqrt(window.reduce((s,v)=>s+(v-mu)**2,0)/window.length)||0.0001;
      zout.push(sp[i]!=null?+((sp[i]-mu)/sigma).toFixed(4):null);
    }
    return{sp,zout};
  }

  const corrVals=rollingCorr(p0,p1,win);
  const {sp,zout}=spreadZ(p0,p1,win);

  // Full-period correlation
  const validPairs=dates.map((_,i)=>[p0[i],p1[i]]).filter(([a,b])=>a!=null&&b!=null);
  let fullCorr=null;
  if(validPairs.length>=3){
    const ma=validPairs.reduce((s,[a])=>s+a,0)/validPairs.length;
    const mb=validPairs.reduce((s,[,b])=>s+b,0)/validPairs.length;
    let num=0,da2=0,db2=0;
    validPairs.forEach(([a,b])=>{num+=(a-ma)*(b-mb);da2+=(a-ma)**2;db2+=(b-mb)**2;});
    const denom=Math.sqrt(da2*db2);
    fullCorr=denom>0?+(num/denom).toFixed(4):null;
  }

  // Spread stats for pairs signal
  const validZ=zout.filter(v=>v!=null);
  const spValid=sp.filter(v=>v!=null);
  const spMean=spValid.length?spValid.reduce((s,v)=>s+v,0)/spValid.length:null;
  const spStd=spValid.length>1?Math.sqrt(spValid.reduce((s,v)=>s+(v-spMean)**2,0)/spValid.length):null;
  const cz=validZ.length?validZ[validZ.length-1]:null;

  // Render rolling corr chart
  const corrBg=corrVals.map(v=>v==null?'rgba(80,80,80,.15)':v>0.7?'rgba(244,67,54,.75)':v>0.3?'rgba(255,214,0,.7)':v<-0.3?'rgba(0,229,255,.7)':'rgba(100,100,100,.4)');
  _cCorr=new Chart(document.getElementById('cmp-corr-c'),{type:'bar',
    data:{labels:dates,datasets:[{data:corrVals,backgroundColor:corrBg,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>c.parsed.y!=null?` Corr: ${c.parsed.y.toFixed(3)}`:' —'}}},
      scales:{x:{display:false},y:{min:-1,max:1,grid:{color:'#1a1a1a'},position:'right',ticks:{color:'#444',maxTicksLimit:5}}}}});
  document.getElementById('cmp-corr-sub').textContent=fullCorr!=null?` — Full period: ${fullCorr.toFixed(3)}`:'';

  // Render spread Z chart
  _cSpread=new Chart(document.getElementById('cmp-spread-c'),{type:'line',
    data:{labels:dates,datasets:[
      {label:'Z',data:zout,borderColor:COLORS[0],borderWidth:1.5,pointRadius:0,fill:false,tension:.2,spanGaps:true},
      {label:'+2σ',data:dates.map(()=>2),borderColor:'rgba(244,67,54,.4)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false},
      {label:'-2σ',data:dates.map(()=>-2),borderColor:'rgba(0,200,83,.4)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{label:c=>c.datasetIndex===0?` Z: ${c.parsed.y?.toFixed(3)}`:null}}},
      scales:{x:{display:false},y:{grid:{color:'#1a1a1a'},position:'right',ticks:{color:'#444',maxTicksLimit:5}}}}});

  // Pairs signal panel
  const sig=cz!=null?(cz>2?`LONG ${_tickers[1]} / SHORT ${_tickers[0]}`:cz<-2?`LONG ${_tickers[0]} / SHORT ${_tickers[1]}`:Math.abs(cz)<0.5?'SPREAD AT MEAN':'WATCH — WIDENING'):'—';
  const sigColor=cz!=null?(Math.abs(cz)>2?'var(--org)':Math.abs(cz)<0.5?'var(--up)':'var(--yel)'):'var(--txt3)';
  document.getElementById('cmp-spread-sub').textContent=cz!=null?` Z=${cz.toFixed(2)}`:'';
  document.getElementById('cmp-pairs-detail').style.display='grid';
  document.getElementById('cmp-perf-rank').style.display='none';
  document.getElementById('cmp-p6-title').textContent='PAIRS SIGNAL';
  document.getElementById('cmp-pairs-detail').innerHTML=`
    <span style="color:var(--txt3);font-size:9px">FULL CORR</span><span class="wht">${fullCorr!=null?fullCorr.toFixed(3):'—'}</span>
    <span style="color:var(--txt3);font-size:9px">CURR Z</span><span style="color:${sigColor};font-weight:700">${cz!=null?cz.toFixed(3):'—'}</span>
    <span style="color:var(--txt3);font-size:9px">SPREAD μ</span><span class="dim">${spMean!=null?spMean.toFixed(4):'—'}</span>
    <span style="color:var(--txt3);font-size:9px">SPREAD σ</span><span class="dim">${spStd!=null?spStd.toFixed(4):'—'}</span>
    <span style="color:var(--txt3);font-size:9px;grid-column:span 2">SIGNAL</span>
    <span style="color:${sigColor};font-weight:700;font-size:11px;grid-column:span 2">${sig}</span>
    <span style="color:var(--txt3);font-size:8px;grid-column:span 2">±2σ entry · ±0.5σ exit</span>`;
}

function renderPerfRank() {
  if(!_statsData.length) return;
  const el = document.getElementById('cmp-perf-rank'); if(!el) return;
  const todayStr=new Date().toISOString().slice(0,10);
  const ranked = _statsData.map((sd,i) => {
    const sorted=[...sd.candles].sort((a,b)=>a.date.localeCompare(b.date));
    if(!sorted.length) return null;
    // Use forward-filled last close (same as chart — last known price = current price)
    const firstClose=sorted[0].close;
    const lastClose=sorted[sorted.length-1].close;
    const ret = (lastClose-firstClose)/firstClose*100;
    const cs = sorted.map(c=>c.close);
    const rets = cs.map((c,j)=>j?(c-cs[j-1])/cs[j-1]:0).slice(1);
    const avg = rets.reduce((s,v)=>s+v,0)/(rets.length||1);
    const std = Math.sqrt(rets.reduce((s,v)=>s+(v-avg)**2,0)/(rets.length||1))||0.0001;
    const sharpe = avg/std*Math.sqrt(252);
    return { ticker:sd.ticker, ret, sharpe, color:COLORS[i] };
  }).filter(Boolean).sort((a,b)=>b.ret-a.ret);
  const maxAbsRet = Math.max(...ranked.map(r=>Math.abs(r.ret)),0.01);
  el.innerHTML = ranked.map((r,i) => `
    <div style="display:flex;align-items:center;gap:5px;padding:2px 8px;border-bottom:1px solid rgba(46,46,46,.4)">
      <span style="width:14px;font-size:8px;color:var(--txt3)">${i+1}</span>
      <span style="width:36px;font-weight:700;color:${r.color}">${r.ticker}</span>
      <div style="flex:1;height:4px;background:var(--bdr);position:relative">
        <div style="position:absolute;top:0;bottom:0;${r.ret>=0?'left:50%':'right:50%;'}width:${(Math.abs(r.ret)/maxAbsRet*50).toFixed(1)}%;background:${r.ret>=0?'var(--up)':'var(--dn)'}"></div>
        <div style="position:absolute;top:-1px;bottom:-1px;left:50%;width:1px;background:var(--bdr2)"></div>
      </div>
      <span style="width:54px;text-align:right;font-weight:700;color:${gcI(r.ret)}">${r.ret>=0?'+':''}${r.ret.toFixed(2)}%</span>
      <span style="width:44px;text-align:right;font-size:9px;color:${r.sharpe>=1?'var(--up)':r.sharpe>0?'var(--yel)':'var(--dn)'}">${r.sharpe.toFixed(2)}sh</span>
    </div>`).join('');
}
})();
</script>
