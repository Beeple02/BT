<!-- F8: HEATMAP — TradingView-style squarified treemap -->
<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
<div class="frow">
  <div class="ff"><label>METRIC</label>
    <select id="hm-mode" onchange="loadHM()">
      <option value="chg">PRICE CHG%</option>
      <option value="vol">VOLATILITY</option>
      <option value="sharpe">SHARPE RATIO</option>
      <option value="max_dd">MAX DRAWDOWN</option>
      <option value="vol_spike">VOLUME SPIKE</option>
      <option value="spread">SPREAD%</option>
      <option value="liq_depth">LIQUIDITY DEPTH</option>
      <option value="concentration">CONCENTRATION (HHI)</option>
      <option value="momentum_burst">MOMENTUM BURST ⚡</option>
      <option value="rel_volume">RELATIVE VOLUME</option>
    </select>
  </div>
  <div class="ff"><label>SIZE BY</label>
    <select id="hm-size" onchange="loadHM()">
      <option value="mcap">MARKET CAP</option>
      <option value="volume">VOLUME</option>
      <option value="equal">EQUAL</option>
    </select>
  </div>
  <div class="ff"><label>RANGE</label>
    <select id="hm-rng" onchange="loadHM()">
      <option value="1">1D</option><option value="7" selected>7D</option>
      <option value="30">30D</option><option value="90">90D</option>
    </select>
  </div>
  <div class="ff"><label>EXCHANGE</label>
    <div style="display:flex;gap:3px">
      <button class="btn btn-xs on" id="hm-ex-ner" onclick="hmSetEx('NER')">NER</button>
      <button class="btn btn-xs" id="hm-ex-tse" onclick="hmSetEx('TSE')">TSE</button>
      <button class="btn btn-xs" id="hm-ex-all" onclick="hmSetEx('ALL')">ALL</button>
    </div>
  </div>
  <button class="btn on" onclick="loadHM()">↻ REFRESH</button>
  <div style="margin-left:auto;display:flex;gap:16px;align-items:flex-end;padding-bottom:4px;font-size:10px">
    <span style="color:var(--txt3)">BEST <span id="hm-best" class="up">—</span></span>
    <span style="color:var(--txt3)">WORST <span id="hm-worst" class="dn">—</span></span>
    <span style="color:var(--txt3)">COUNT <span id="hm-cnt" class="wht">—</span></span>
    <span id="hm-upd" style="color:var(--txt3)"></span>
  </div>
</div>
<div style="padding:0 8px 3px;flex-shrink:0;display:flex;align-items:center;gap:12px">
  <span id="hm-legend" style="font-size:9px;color:var(--txt3)"></span>
  <div style="display:flex;align-items:center;gap:3px;margin-left:auto;font-size:8px;color:var(--txt3)">
    <span>BEARISH</span>
    <div style="width:80px;height:6px;background:linear-gradient(90deg,rgb(230,25,35),rgb(60,15,20),rgb(38,38,38),rgb(10,60,30),rgb(10,180,60))"></div>
    <span>BULLISH</span>
    <span style="margin-left:8px;color:var(--txt3)">· click cell to trade</span>
  </div>
</div>
<div style="flex:1;display:flex;overflow:hidden">
  <div id="heatmap" style="flex:1;position:relative;overflow:hidden"></div>
  <!-- Sidebar -->
  <div style="width:168px;flex-shrink:0;border-left:1px solid var(--bdr);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)">
    <!-- Top movers -->
    <div style="border-bottom:1px solid var(--bdr)">
      <div class="wbar" style="height:18px"><div class="wbar-l"><span class="wnum" style="font-size:7px">▲</span><span class="wtitle" style="font-size:9px">TOP GAINERS</span></div></div>
      <div id="hm-top" style="font-size:9px"></div>
    </div>
    <div style="border-bottom:1px solid var(--bdr)">
      <div class="wbar" style="height:18px"><div class="wbar-l"><span class="wnum" style="font-size:7px;background:var(--dn)">▼</span><span class="wtitle" style="font-size:9px">TOP LOSERS</span></div></div>
      <div id="hm-bot" style="font-size:9px"></div>
    </div>
    <!-- Exchange stats -->
    <div style="flex:1;overflow-y:auto">
      <div class="wbar" style="height:18px"><div class="wbar-l"><span class="wnum" style="font-size:7px">Σ</span><span class="wtitle" style="font-size:9px">MARKET STATS</span></div></div>
      <div id="hm-stats" style="padding:4px 6px;font-size:9px"></div>
    </div>
    <!-- Auto-refresh toggle -->
    <div style="padding:4px 6px;border-top:1px solid var(--bdr);display:flex;gap:4px;align-items:center">
      <span class="live-dot" id="hm-live-dot"></span>
      <span style="font-size:8px;color:var(--txt3)" id="hm-live-label">LIVE 30s</span>
      <button class="btn btn-xs" style="margin-left:auto;font-size:7px;padding:1px 4px" onclick="hmToggleLive(this)">PAUSE</button>
    </div>
  </div>
</div>
</div>

<style>
.hm-cell{position:absolute;box-sizing:border-box;border:2px solid #0a0a0a;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:filter .1s;overflow:hidden;user-select:none}
.hm-cell:hover{filter:brightness(1.35);z-index:10}
.hm-cell .hm-t{font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 3px rgba(0,0,0,.9);line-height:1.2}
.hm-cell .hm-v{font-weight:600;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.9);line-height:1.2}
.hm-pop{position:absolute;z-index:100;background:#111;border:1px solid var(--org);padding:10px 12px;min-width:180px;box-shadow:0 4px 24px rgba(0,0,0,.8);pointer-events:auto}
.hm-act-b{background:rgba(0,200,83,.2);border:1px solid var(--up);color:var(--up);cursor:pointer;font-family:var(--font);font-size:9px;font-weight:700;padding:3px 8px;flex:1}
.hm-act-s{background:rgba(244,67,54,.2);border:1px solid var(--dn);color:var(--dn);cursor:pointer;font-family:var(--font);font-size:9px;font-weight:700;padding:3px 8px;flex:1}
.hm-act-c{background:rgba(0,229,255,.1);border:1px solid var(--cyn);color:var(--cyn);cursor:pointer;font-family:var(--font);font-size:9px;font-weight:700;padding:3px 6px}
</style>

<script>
(function(){
let _cache={}, _obCache={}, _holderCache={};
let _hmEx = 'NER';
let _hmGen = 0; // incremented on each loadHM call; stale renders abort

window.hmSetEx = function(ex) {
  _hmEx = ex;
  ['NER','TSE','ALL'].forEach(e => {
    const btn = document.getElementById('hm-ex-' + e.toLowerCase());
    if (btn) btn.classList.toggle('on', e === ex);
  });
  loadHM();
};

window.PAGE_hm_onShow=function(){ loadHM(); };

// ── Golden-ratio treemap — TradingView-style ───────────────────────────────
// The largest item always claims the φ-proportioned slice of the longer axis.
// The remainder recurse into the leftover rectangle, creating the organic
// nested / spiral look that TradingView uses.
//
// φ ≈ 0.618  (1/golden-ratio) — largest cell takes this fraction of the axis.
// When only 2 items remain we use their exact weight ratio instead.

const PHI = 0.6180339887; // 1/φ

function squarify(items, x, y, w, h) {
  if (!items.length) return [];
  const total = items.reduce((s, i) => s + i.v, 0) || 1;
  // Normalise so weights sum to 1
  const norm  = items.map(i => ({...i, v: i.v / total}));
  // Must be sorted descending — caller already does this but enforce here
  norm.sort((a, b) => b.v - a.v);
  const result = [];
  _goldenLayout(norm, x, y, w, h, result);
  return result;
}

function _goldenLayout(items, x, y, w, h, out) {
  if (!items.length) return;

  // Snap dimensions to integer pixels to stop drift accumulating
  x = Math.round(x); y = Math.round(y);
  w = Math.round(w); h = Math.round(h);
  if (w < 1 || h < 1) return;

  if (items.length === 1) {
    out.push({...items[0], x, y, w, h});
    return;
  }

  const total = items.reduce((s, i) => s + i.v, 0);

  if (items.length === 2) {
    // Exact split by weight
    const frac = items[0].v / total;
    if (w >= h) {
      const w0 = Math.round(w * frac);
      out.push({...items[0], x,      y, w: w0,     h});
      out.push({...items[1], x: x+w0, y, w: w-w0,  h});
    } else {
      const h0 = Math.round(h * frac);
      out.push({...items[0], x, y,      w, h: h0   });
      out.push({...items[1], x, y: y+h0, w, h: h-h0});
    }
    return;
  }

  // Find the split point: the largest item gets PHI of the long axis,
  // then greedily add more items to that slab while their total weight
  // doesn't exceed PHI (keeps the slab well-filled without over-crowding).
  const slabTarget = total * PHI;
  let slabSum = 0, splitIdx = 0;
  for (let i = 0; i < items.length - 1; i++) {
    slabSum += items[i].v;
    splitIdx = i + 1;
    if (slabSum >= slabTarget) break;
  }
  // Ensure at least one item in each partition
  if (splitIdx === 0) splitIdx = 1;
  if (splitIdx >= items.length) splitIdx = items.length - 1;

  const slab = items.slice(0, splitIdx);
  const rest = items.slice(splitIdx);
  const slabFrac = slabSum / total;

  if (w >= h) {
    // Split vertically — slab on the left
    const slabW = Math.round(w * slabFrac);
    _fillSlab(slab, slabSum, x, y, slabW, h, out);
    _goldenLayout(rest, x + slabW, y, w - slabW, h, out);
  } else {
    // Split horizontally — slab on top
    const slabH = Math.round(h * slabFrac);
    _fillSlab(slab, slabSum, x, y, w, slabH, out);
    _goldenLayout(rest, x, y + slabH, w, h - slabH, out);
  }
}

// Fill a slab with its items stacked along the slab's SHORT axis
function _fillSlab(items, total, x, y, w, h, out) {
  if (!items.length) return;
  if (items.length === 1) { out.push({...items[0], x, y, w, h}); return; }
  // Stack items along the short axis of this slab
  const stackHoriz = w < h; // stack left-right inside a tall slab, top-bottom inside a wide slab
  let pos = 0;
  items.forEach((item, idx) => {
    const isLast = idx === items.length - 1;
    const frac   = item.v / total;
    if (stackHoriz) {
      const iw = isLast ? w - pos : Math.round(frac * w);
      out.push({...item, x: x + pos, y, w: iw, h});
      pos += iw;
    } else {
      const ih = isLast ? h - pos : Math.round(frac * h);
      out.push({...item, x, y: y + pos, w, h: ih});
      pos += ih;
    }
  });
}

window.loadHM = async function() {
  const days     = document.getElementById('hm-rng').value;
  const mode     = document.getElementById('hm-mode').value;
  const sizeMode = document.getElementById('hm-size').value;
  const el       = document.getElementById('heatmap');
  const _gen = ++_hmGen;
  el.innerHTML   = '<div class="loading" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)">LOADING…</div>';

  const needsOB   = ['spread','liq_depth','vol_spike'].includes(mode);
  const needsHold = mode === 'concentration';

  const filteredSecs = (BB.secs || []).filter(s => {
    if (_hmEx === 'NER') return !s.ticker.startsWith('TSE:');
    if (_hmEx === 'TSE') return  s.ticker.startsWith('TSE:');
    return true;
  });
  const priceResults = await Promise.all(filteredSecs.map(async s => {
    const key = s.ticker + days;
    if (_cache[key]) return _cache[key];

    // TSE tickers: ohlcv returns empty — use price_history instead
    let closes, vols;
    if (s.ticker.startsWith('TSE:')) {
      const ph = await api(`/api/analytics/price_history/${s.ticker}?days=365`);
      const pts = Array.isArray(ph.d) ? ph.d : Array.isArray(ph.d?.data) ? ph.d.data : [];
      if (!ph.ok || pts.length < 2) return null;
      // Dedupe by id, group into daily candles
      const seen = new Set();
      const byDay = {};
      pts.forEach(pt => {
        if (pt.id !== undefined) { if (seen.has(pt.id)) return; seen.add(pt.id); }
        const ts = typeof pt.timestamp === 'number'
          ? new Date(pt.timestamp * (pt.timestamp > 1e10 ? 1 : 1000))
          : new Date(pt.timestamp);
        if (isNaN(ts)) return;
        const ds = ts.toISOString().slice(0, 10);
        const px = parseFloat(pt.price || 0), vol = pt.volume || 0;
        if (!px) return;
        if (!byDay[ds]) byDay[ds] = { open: px, high: px, low: px, close: px, volume: vol, date: ds };
        else { byDay[ds].high = Math.max(byDay[ds].high, px); byDay[ds].low = Math.min(byDay[ds].low, px); byDay[ds].close = px; byDay[ds].volume += vol; }
      });
      // Trim to display window
      const cutoff = new Date(); cutoff.setUTCDate(cutoff.getUTCDate() - parseInt(days));
      const cutoffStr = cutoff.toISOString().slice(0, 10);
      const cs = Object.values(byDay).sort((a,b) => a.date.localeCompare(b.date)).filter(c => c.date >= cutoffStr);
      if (cs.length < 2) return null;
      closes = cs.map(c => c.close);
      vols   = cs.map(c => c.volume);
    } else {
      const r = await api(`/api/analytics/ohlcv/${s.ticker}?days=${days}`);
      if (!r.ok || !r.d.candles?.length) return null;
      const cs = r.d.candles;
      closes = cs.map(c => c.close); vols = cs.map(c => c.volume);
    }

    const first = closes[0], last = closes[closes.length - 1];
    const chg = (last - first) / first * 100;
    const rets = closes.map((c, i) => i ? (c - closes[i-1]) / closes[i-1] : 0).slice(1);
    const avg = rets.reduce((s, v) => s + v, 0) / (rets.length || 1);
    const std = Math.sqrt(rets.reduce((s, v) => s + (v - avg) ** 2, 0) / (rets.length || 1)) || 0.0001;
    const annVol = std * Math.sqrt(252) * 100;
    const sharpe = avg / std * Math.sqrt(252);
    let peak = closes[0], maxDD = 0;
    for (const c of closes) { if (c > peak) peak = c; const dd = (peak - c) / peak; if (dd > maxDD) maxDD = dd; }
    const avgVol = vols.slice(0, -1).reduce((s, v) => s + v, 0) / Math.max(vols.length - 1, 1);
    const volSpike = avgVol > 0 ? vols[vols.length - 1] / avgVol : 1;
    const mb = closes.length >= 6 ? (() => {
      const lastChg = (closes[closes.length-1] - closes[closes.length-2]) / closes[closes.length-2];
      const prior = closes.slice(-7, -2);
      const a5 = prior.length > 1 ? prior.map((c,i) => i ? (c-prior[i-1])/prior[i-1] : 0).slice(1).reduce((s,v)=>s+v,0)/(prior.length-1) : 0;
      return (lastChg - a5) * 100;
    })() : 0;
    const relVol = avgVol > 0 ? (vols[vols.length-1] / avgVol - 1) * 100 : 0;
    const result = {
      ticker: s.ticker, name: s.full_name,
      mcap: (s.total_shares || 1) * last, volume: vols[vols.length-1] || 1, last,
      chg, annVol, sharpe, maxDD: maxDD * 100, volSpike, relVol, momentumBurst: mb
    };
    _cache[key] = result;
    return result;
  }));

  let valid = priceResults.filter(Boolean);
  if (_gen !== _hmGen) return;
  if (!valid.length) { el.innerHTML = '<div class="loading">NO DATA</div>'; return; }

  if (needsOB) {
    const obR = await api('/api/market_orderbook');
    if (obR.ok) obR.d.books.forEach(b => { _obCache[b.ticker] = b; });
    valid = valid.map(s => ({...s, spread: _obCache[s.ticker]?.spread_pct ?? null, liqDepth: _obCache[s.ticker]?.total_depth ?? 0}));
  }
  if (needsHold) {
    const holdR = await api('/api/holder_intel');
    if (holdR.ok) holdR.d.securities.forEach(h => { _holderCache[h.ticker] = h; });
    valid = valid.map(s => ({...s, hhi: _holderCache[s.ticker]?.hhi ?? null}));
  }

  const val = v => ({
    chg: v.chg, vol: -v.annVol, sharpe: v.sharpe, max_dd: -v.maxDD,
    vol_spike: v.volSpike != null ? v.volSpike - 1 : null,
    spread: v.spread != null ? -v.spread : null,
    liq_depth: v.liqDepth ?? null,
    concentration: v.hhi != null ? -v.hhi : null,
    momentum_burst: v.momentumBurst ?? null,
    rel_volume: v.relVol ?? null,
  }[mode]);

  const label = v => {
    const vv = val(v); if (vv == null) return '—';
    switch (mode) {
      case 'chg':            return (vv >= 0 ? '+' : '') + vv.toFixed(2) + '%';
      case 'vol':            return (-vv).toFixed(1) + '% pa';
      case 'sharpe':         return vv.toFixed(2);
      case 'max_dd':         return '-' + (-vv).toFixed(1) + '%';
      case 'vol_spike':      return (vv + 1).toFixed(2) + 'x';
      case 'spread':         return (-vv).toFixed(3) + '%';
      case 'liq_depth':      return fk(vv);
      case 'concentration':  return 'HHI ' + (-vv).toFixed(0);
      case 'momentum_burst': return (vv >= 0 ? '⚡+' : '') + vv.toFixed(2) + '%';
      case 'rel_volume':     return (vv >= 0 ? '+' : '') + vv.toFixed(0) + '% vs avg';
    }
  };

  const sizeOf = v => { const raw = sizeMode === 'mcap' ? v.mcap : sizeMode === 'volume' ? v.volume : 1; return raw > 0 ? raw : 1; };
  const sorted = [...valid].filter(v => val(v) != null).sort((a, b) => sizeOf(b) - sizeOf(a));
  if (_gen !== _hmGen) return;
  if (!sorted.length) { el.innerHTML = '<div class="loading">NO DATA FOR THIS METRIC</div>'; return; }

  const vals = sorted.map(v => val(v));
  const maxAbs = Math.max(...vals.map(v => Math.abs(v)), 0.001);

  document.getElementById('hm-best').textContent   = [...sorted].sort((a,b) => val(b)-val(a))[0]?.ticker || '—';
  document.getElementById('hm-worst').textContent  = [...sorted].sort((a,b) => val(a)-val(b))[0]?.ticker || '—';
  document.getElementById('hm-cnt').textContent    = sorted.length;
  document.getElementById('hm-upd').textContent    = 'Updated ' + new Date().toLocaleTimeString('en-GB');

  const legends = {
    chg:'Green=up · Red=down', vol:'Green=low vol · Red=high vol',
    sharpe:'Green=high Sharpe · Red=negative', max_dd:'Green=small DD · Red=large',
    vol_spike:'Volume vs prior avg — spike detection', spread:'Green=tight · Red=wide',
    liq_depth:'Green=deep book · Red=thin', concentration:'Green=distributed · Red=concentrated',
    momentum_burst:'⚡ Green=accelerating vs prior 5 bars', rel_volume:'Green=above 30d avg · Red=below'
  };
  document.getElementById('hm-legend').textContent = legends[mode] || '';

  if (_gen !== _hmGen) return; // abort stale render
  // Build treemap — sorted descending by size (required for squarify quality)
  // If container has no dimensions yet (layout not settled), retry after a frame
  let W = el.offsetWidth, H = el.offsetHeight;
  if (!W || !H) {
    await new Promise(r => requestAnimationFrame(r));
    W = el.offsetWidth || 800; H = el.offsetHeight || 400;
  }
  const totalSz = sorted.reduce((s, v) => s + sizeOf(v), 0) || 1;
  const items = sorted.map(v => ({...v, v: sizeOf(v) / totalSz}));
  const rects = squarify(items, 0, 0, W, H);

  el.innerHTML = '';
  rects.forEach(r => {
    const v = val(r);
    if (v == null) return;

    // Clamp to container — kills any floating-point bleed beyond edges
    const rx = Math.max(0, Math.round(r.x));
    const ry = Math.max(0, Math.round(r.y));
    const rw = Math.min(W - rx, Math.max(2, Math.round(r.w)));
    const rh = Math.min(H - ry, Math.max(2, Math.round(r.h)));

    const intensity = Math.min(Math.abs(v) / maxAbs, 1);
    // TradingView-style deep green/red, brightness scales with magnitude
    const bg = v > 0
      ? `rgb(${Math.round(10 + intensity*8)},${Math.round(100 + intensity*105)},${Math.round(40 + intensity*18)})`
      : v < 0
      ? `rgb(${Math.round(140 + intensity*90)},${Math.round(20 + intensity*5)},${Math.round(22 + intensity*8)})`
      : 'rgb(42,42,42)';

    const cell = document.createElement('div');
    cell.className = 'hm-cell';
    cell.style.left       = rx + 'px';
    cell.style.top        = ry + 'px';
    cell.style.width      = rw + 'px';
    cell.style.height     = rh + 'px';
    cell.style.background = bg;

    const minSide = Math.min(rw, rh);
    const tkSz   = Math.max(9, Math.min(22, minSide * 0.25));
    const vlSz   = Math.max(8, Math.min(14, minSide * 0.16));
    const valColor = v > 0 ? '#a8ffbe' : v < 0 ? '#ffaaaa' : '#aaa';

    const exBadge = (_hmEx === 'ALL' && r.ticker.startsWith('TSE:')) ? '<span style="font-size:7px;opacity:.65;display:block;line-height:1;color:#00e5ff">TSE</span>' : '';
    if (minSide > 28) {
      cell.innerHTML = `${exBadge}<span class="hm-t" style="font-size:${tkSz}px;max-width:${rw-6}px">${r.ticker}</span>`
        + (minSide > 44 ? `<span class="hm-v" style="font-size:${vlSz}px;color:${valColor}">${label(r)}</span>` : '');
    } else if (minSide > 14) {
      cell.style.fontSize = '7px';
      cell.style.color = '#ffffffaa';
      cell.style.textAlign = 'center';
      cell.textContent = r.ticker;
    }

    cell.title = `${r.ticker} — ${r.name}\n${label(r)}`;

    // Click: show action overlay instead of immediately jumping
    cell.onclick = () => {
      // Remove any existing popover
      document.querySelectorAll('.hm-pop').forEach(p=>p.remove());
      const pop = document.createElement('div');
      pop.className = 'hm-pop';
      const livePrice = BB.secs.find(s=>s.ticker===r.ticker)?.market_price;
      pop.innerHTML = `
        <div style="font-size:14px;font-weight:700;color:var(--wht);margin-bottom:2px">${r.ticker}</div>
        <div style="font-size:9px;color:var(--txt3);margin-bottom:6px">${r.name||''}</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px">
          <span style="color:var(--txt3)">METRIC</span><span style="color:${v>=0?'var(--up)':'var(--dn)'};font-weight:700">${label(r)}</span>
        </div>
        ${livePrice!=null?`<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:10px"><span style="color:var(--txt3)">LAST</span><span style="color:var(--wht);font-weight:700">$${f(livePrice,4)}</span></div>`:''}
        <div style="display:flex;gap:4px;margin-top:4px">
          <button class="hm-act-b" onclick="hmQuickOrder('${r.ticker}','buy')">▲ BUY</button>
          <button class="hm-act-s" onclick="hmQuickOrder('${r.ticker}','sell')">▼ SELL</button>
          <button class="hm-act-c" onclick="sw('tkr');setTimeout(()=>PAGE_tkr_load&&PAGE_tkr_load('${r.ticker}'),200);document.querySelectorAll('.hm-pop').forEach(p=>p.remove())">CHART →</button>
        </div>`;
      // Position near cell center
      const rect = cell.getBoundingClientRect();
      const hmRect = el.getBoundingClientRect();
      pop.style.left = Math.min(rect.left - hmRect.left + rect.width/2 - 90, hmRect.width - 190) + 'px';
      pop.style.top  = Math.min(rect.top  - hmRect.top  + rect.height/2 - 60, hmRect.height - 140) + 'px';
      el.appendChild(pop);
      // Click elsewhere to dismiss
      setTimeout(()=>document.addEventListener('click', function d(e){ if(!pop.contains(e.target)){pop.remove();document.removeEventListener('click',d);} }), 50);
    };
    el.appendChild(cell);
  });
  renderHMSidebar(sorted, vals, mode, maxAbs);
};
window.hmQuickOrder = function(ticker, side) {
  document.querySelectorAll('.hm-pop').forEach(p=>p.remove());
  sw('ord');
  setTimeout(()=>{
    const tkSel=document.getElementById('op-tk');
    if(tkSel){tkSel.value=ticker;if(window.opTickerChg)opTickerChg();}
    if(window.opSide) opSide(side);
  },300);
};

function renderHMSidebar(sorted, vals, mode, maxAbs) {
  const byVal = [...sorted].map((s,i)=>({...s, _v: vals[i]})).filter(s=>s._v!=null);
  const top = [...byVal].sort((a,b)=>b._v-a._v).slice(0,4);
  const bot = [...byVal].sort((a,b)=>a._v-b._v).slice(0,4);

  const modeLabel = {
    chg:'chg%', vol:'vol%pa', sharpe:'Sharpe', max_dd:'DD%',
    vol_spike:'vol×', spread:'sprd%', liq_depth:'depth',
    concentration:'HHI', momentum_burst:'burst', rel_volume:'relVol'
  }[document.getElementById('hm-mode').value] || '';

  function mkItem(s, isTop) {
    const v = s._v;
    const color = isTop ? 'var(--up)' : 'var(--dn)';
    const barW = Math.min(Math.abs(v)/maxAbs*100, 100).toFixed(0);
    return `<div style="padding:2px 6px;border-bottom:1px solid rgba(46,46,46,.4);cursor:pointer" onclick="sw('tkr');setTimeout(()=>PAGE_tkr_load&&PAGE_tkr_load('${s.ticker}'),200)">
      <div style="display:flex;justify-content:space-between">
        <span style="font-weight:700;color:var(--org)">${s.ticker}</span>
        <span style="color:${color};font-weight:700">${v>=0?'+':''}${typeof v==='number'?v.toFixed(2):'—'}</span>
      </div>
      <div style="height:2px;background:var(--bdr);margin-top:2px">
        <div style="height:100%;width:${barW}%;background:${color}"></div>
      </div>
    </div>`;
  }

  document.getElementById('hm-top').innerHTML = top.map(s=>mkItem(s,true)).join('');
  document.getElementById('hm-bot').innerHTML = bot.map(s=>mkItem(s,false)).join('');

  // Market stats
  const advancing = sorted.filter((s,i)=>vals[i]>0).length;
  const declining = sorted.filter((s,i)=>vals[i]<0).length;
  const avg = vals.reduce((a,b)=>a+b,0)/vals.length;
  const maxV = Math.max(...vals), minV = Math.min(...vals);
  document.getElementById('hm-stats').innerHTML = `
    <div class="rm"><span class="k">SECURITIES</span><span class="v wht">${sorted.length}</span></div>
    <div class="rm"><span class="k">ADVANCING</span><span class="v up">${advancing}</span></div>
    <div class="rm"><span class="k">DECLINING</span><span class="v dn">${declining}</span></div>
    <div class="rm"><span class="k">BREADTH</span><span class="v" style="color:${advancing>declining?'var(--up)':'var(--dn)'}">${sorted.length?Math.round(advancing/sorted.length*100):0}%</span></div>
    <div class="rm"><span class="k">AVG ${modeLabel.toUpperCase()}</span><span class="v" style="color:${avg>=0?'var(--up)':'var(--dn)'}">${avg>=0?'+':''}${avg.toFixed(2)}</span></div>
    <div class="rm"><span class="k">RANGE</span><span class="v dim">${minV.toFixed(2)} → ${maxV.toFixed(2)}</span></div>`;
}

let _hmLive = true, _hmIv = null;
window.hmToggleLive = function(btn) {
  _hmLive = !_hmLive;
  btn.textContent = _hmLive ? 'PAUSE' : 'RESUME';
  const dot = document.getElementById('hm-live-dot');
  const lbl = document.getElementById('hm-live-label');
  if(dot) dot.style.background = _hmLive ? 'var(--up)' : 'var(--dn)';
  if(lbl) lbl.textContent = _hmLive ? 'LIVE 30s' : 'PAUSED';
};
_hmIv = setInterval(()=>{ if(_hmLive && BB.activePanel==='hm') loadHM(); }, 30000);
})();
</script>
