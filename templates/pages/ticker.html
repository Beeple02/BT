    <!-- Risk Profile -->

    <!-- Shareholder Intelligence -->
    <div class="win" style="flex:1;min-height:80px;border-top:0;border-bottom:0">
      <div class="wbar"><div class="wbar-l"><span class="wnum">8</span><span class="wtitle">HOLDER INTEL</span></div></div>
      <div id="tkr-hi" style="padding:5px 8px;font-size:10px">—</div>
    </div>
    <!-- Recent trades feed for this ticker -->
    <div class="win" style="flex:2;min-height:100px;border-top:0;border-bottom:0">
      <div class="wbar">
        <div class="wbar-l"><span class="wnum">9</span><span class="wtitle">RECENT PRINTS</span><span class="live-dot" style="margin-left:4px" id="tkr-prints-dot"></span><span class="wsub" id="tkr-print-ct"></span></div>
        <div class="wbar-r">
          <button style="font-size:8px;padding:1px 5px;background:rgba(0,200,83,.15);border:1px solid var(--up);color:var(--up);cursor:pointer;font-family:var(--font);font-weight:700" id="tkr-buy-btn" onclick="tkrQuickOrder('buy')">BUY</button>
          <button style="font-size:8px;padding:1px 5px;background:rgba(244,67,54,.15);border:1px solid var(--dn);color:var(--dn);cursor:pointer;font-family:var(--font);font-weight:700" id="tkr-sell-btn" onclick="tkrQuickOrder('sell')">SELL</button>
        </div>
      </div>
      <div class="scroll" id="tkr-prints"><div class="loading">—</div></div>
    </div>
    <!-- Shareholders list -->
    <div class="win" style="flex:2;min-height:100px;border-top:0">
      <div class="wbar"><div class="wbar-l"><span class="wnum">10</span><span class="wtitle">SHAREHOLDERS</span></div></div>
      <div class="scroll" id="tkr-sh"><div class="loading">—</div></div>
    </div>
  </div>

</div>
</div>

<style>
.kpi-l{font-size:9px;color:var(--txt3);letter-spacing:1.5px;margin-bottom:1px}
.kpi-v{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--wht)}
.kpi-v2{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}

.micro-grid .v{font-variant-numeric:tabular-nums;font-size:10px;font-weight:600}
</style>

<script>
(function(){
let _d=null, _ovs=new Set(['vwap']), _ch={};

// ── Forward-fill candle array to today ────────────────────────────────────
// For illiquid tickers that go days/weeks without a trade, this generates
// a synthetic candle for every calendar day up to today, carrying the last
// known OHLCV forward (volume=0 for synthetic days).
// Also forward-fills any indicator arrays (sma20, rsi14, etc.) to match.
function forwardFillCandles(candles, indicatorArrays) {
  if(!candles || candles.length < 2) return { candles, indicators: indicatorArrays };
  const todayStr = new Date().toISOString().slice(0,10);
  // Build date→index map from real candles
  const byDate = {};
  candles.forEach((c,i) => { if(c.date) byDate[c.date] = i; });
  const firstDate = candles[0].date;
  if(!firstDate || firstDate >= todayStr) return { candles, indicators: indicatorArrays };

  // Walk every calendar day from first candle to today
  const filled = [];
  const filledIndicators = Object.fromEntries(
    Object.keys(indicatorArrays).map(k => [k, []])
  );
  const cur = new Date(firstDate + 'T12:00:00Z');
  const end = new Date(todayStr  + 'T12:00:00Z');
  let lastCandle = candles[0];
  let lastIndicatorVals = Object.fromEntries(
    Object.keys(indicatorArrays).map(k => [k, null])
  );

  while(cur <= end) {
    const ds = cur.toISOString().slice(0,10);
    if(byDate[ds] !== undefined) {
      // Real candle — use it
      lastCandle = candles[byDate[ds]];
      Object.keys(indicatorArrays).forEach(k => {
        const v = indicatorArrays[k]?.[byDate[ds]];
        if(v != null) lastIndicatorVals[k] = v;
      });
    }
    // Push forward-filled (or real) candle
    filled.push({
      ...lastCandle,
      date: ds,
      // synthetic days get 0 volume so bars don't lie about activity
      volume: byDate[ds] !== undefined ? lastCandle.volume : 0,
      _synthetic: byDate[ds] === undefined,
    });
    Object.keys(indicatorArrays).forEach(k => {
      filledIndicators[k].push(lastIndicatorVals[k]);
    });
    cur.setUTCDate(cur.getUTCDate() + 1);
  }

  return { candles: filled, indicators: filledIndicators };
}

window.PAGE_tkr_onShow = function(ticker, exchange){
  populateSel('tkr-sel');
  const sel=document.getElementById('tkr-sel');
  sel.onchange = () => {
    // Value may be "TICKER" or "TICKER|EXCHANGE" for dual-listed
    const parts = sel.value.split('|');
    const tk = parts[0], exFromVal = parts[1]||null;
    const ex = exFromVal || _inferExchange(tk) || document.getElementById('tkr-exch').value;
    document.getElementById('tkr-exch').value = ex;
    PAGE_tkr_load(tk, ex);
  };
  document.getElementById('tkr-rng').onchange = () => { if(sel.value) { const parts=sel.value.split('|'); PAGE_tkr_load(parts[0], parts[1]||document.getElementById('tkr-exch').value); } };
  document.getElementById('tkr-ct').onchange  = () => { if(sel.value) { const parts=sel.value.split('|'); PAGE_tkr_load(parts[0], parts[1]||document.getElementById('tkr-exch').value); } };
  // If called with specific ticker+exchange (e.g. from tape click)
  if(ticker){ sel.value=ticker; if(exchange) document.getElementById('tkr-exch').value=exchange; PAGE_tkr_load(ticker, exchange||document.getElementById('tkr-exch').value); }
};

// When exchange dropdown changes, reload with same ticker
window._onTkrExchChange = function(){
  const tk = document.getElementById('tkr-sel').value;
  const ex = document.getElementById('tkr-exch').value;
  if(tk) PAGE_tkr_load(tk, ex);
};

// Infer exchange from BB.secs — if ticker only exists on one exchange, pick that
function _inferExchange(ticker){
  if(!BB.secs) return 'NER';
  const matches = BB.secs.filter(s=>s.ticker===ticker);
  if(matches.length===1) return matches[0].exchange||'NER';
  return null; // dual-listed — don't force
}

window.PAGE_tkr_load = async function(ticker, exchange) {
  if(!ticker) return;
  const exch = exchange || document.getElementById('tkr-exch').value || 'NER';
  document.getElementById('tkr-sel').value = ticker;
  document.getElementById('tkr-exch').value = exch;
  const days  = document.getElementById('tkr-rng').value;
  const ctype = document.getElementById('tkr-ct').value;

  // ── Route by exchange ────────────────────────────────────────────────────
  if(exch === 'TSE') {
    return await _loadTSETicker(ticker, days, ctype);
  }

  // Fetch extra candles for indicator warmup (SMA100 needs 100 bars minimum).
  // Without warmup, short ranges (e.g. 30D) return arrays that are almost
  // entirely leading nulls — overlays appear blank even though data exists.
  const fetchDays = parseInt(days) + 120;

  const [sR, obR, hiR] = await Promise.all([
    api(`/api/ticker_stats/${ticker}?days=${fetchDays}`),
    api(`/api/orderbook?ticker=${ticker}`),
    api(`/api/holder_intel/${ticker}`)
  ]);
  loadTkrPrints(ticker);

  if(!sR.ok) {
    document.getElementById('tkr-px').textContent = 'ERR';
    document.getElementById('tkr-px').style.color = 'var(--dn)';
    console.error('ticker_stats failed', sR.s, sR.d);
    return;
  }
  _d = sR.d;
  // Forward-fill candles + all indicator series to today
  const _ff = forwardFillCandles(_d.candles, {
    sma20:   _d.sma20,   sma50:  _d.sma50,  sma100: _d.sma100,
    vwap:    _d.vwap,    bb_upper: _d.bb_upper, bb_lower: _d.bb_lower,
    macd_line: _d.macd_line, macd_signal: _d.macd_signal, macd_hist: _d.macd_hist,
    rsi14:   _d.rsi14,   vol_ma20: _d.vol_ma20, atr14: _d.atr14,
  });
  _d.candles    = _ff.candles;
  _d.sma20      = _ff.indicators.sma20;    _d.sma50    = _ff.indicators.sma50;
  _d.sma100     = _ff.indicators.sma100;   _d.vwap     = _ff.indicators.vwap;
  _d.bb_upper   = _ff.indicators.bb_upper; _d.bb_lower = _ff.indicators.bb_lower;
  _d.macd_line  = _ff.indicators.macd_line; _d.macd_signal = _ff.indicators.macd_signal;
  _d.macd_hist  = _ff.indicators.macd_hist; _d.rsi14   = _ff.indicators.rsi14;
  _d.vol_ma20   = _ff.indicators.vol_ma20;  _d.atr14   = _ff.indicators.atr14;

  // Trim all arrays back to the user-selected display window.
  // candles and ALL indicator arrays must be sliced at the same index.
  const trimIdx = Math.max(0, _d.candles.length - parseInt(days));
  const trimArr = arr => Array.isArray(arr) ? arr.slice(trimIdx) : arr;
  _d.candles    = trimArr(_d.candles);
  _d.sma20      = trimArr(_d.sma20);    _d.sma50    = trimArr(_d.sma50);
  _d.sma100     = trimArr(_d.sma100);   _d.vwap     = trimArr(_d.vwap);
  _d.bb_upper   = trimArr(_d.bb_upper); _d.bb_lower = trimArr(_d.bb_lower);
  _d.macd_line  = trimArr(_d.macd_line); _d.macd_signal = trimArr(_d.macd_signal);
  _d.macd_hist  = trimArr(_d.macd_hist); _d.rsi14   = trimArr(_d.rsi14);
  _d.vol_ma20   = trimArr(_d.vol_ma20);  _d.atr14   = trimArr(_d.atr14);

  const cs=_d.candles, cl=cs.map(c=>c.close), hi=cs.map(c=>c.high), lo=cs.map(c=>c.low);
  const vols=cs.map(c=>c.volume), dates=cs.map(c=>c.date), last=cl[cl.length-1];
  const sec = (BB.secs||[]).find(s=>s.ticker===ticker) || {};

  // ── Header KPIs ────────────────────────────────────────────────────────────
  const set = (id, v, cls) => { const e=document.getElementById(id); if(!e) return; e.textContent=v; if(cls) e.className=e.className.replace(/up|dn|yel/g,'')+' '+cls; };
  set('tkr-px',   f(last)); document.getElementById('tkr-px').style.color = gc(_d.price_chg_pct);
  set('tkr-chg',  fp(_d.price_chg_pct)); document.getElementById('tkr-chg').style.color = gc(_d.price_chg_pct);
  set('tkr-vol',  _d.volatility_ann_pct + '%');
  set('tkr-shrp', f(_d.sharpe, 2)); document.getElementById('tkr-shrp').style.color = gc(_d.sharpe);
  set('tkr-mdd',  '-' + _d.max_drawdown_pct + '%');
  document.getElementById('tkr-frz').style.display = sec.frozen ? 'inline-block' : 'none';

  // ── Stat strip ─────────────────────────────────────────────────────────────
  const lc = cs[cs.length-1];
  const lastATR = (_d.atr14||[]).filter(v=>v!=null).pop();
  set('ts-o',  f(lc.open)); set('ts-h', f(lc.high)); set('ts-l', f(lc.low));
  set('ts-c',  f(lc.close));
  set('ts-v',  lc.volume != null ? lc.volume.toLocaleString() : '—');
  set('ts-av', (_d.avg_volume||0).toLocaleString());
  set('ts-ph', f(_d.high_period)); set('ts-pl', f(_d.low_period));
  set('ts-atr', lastATR ? f(lastATR,4) : '—');
  set('ts-mc',  sec.total_shares ? fk(sec.total_shares * last) : '—');

  // ── Near high / near low badge ─────────────────────────────────────────────
  const pHi=_d.high_period, pLo=_d.low_period;
  let badge=document.getElementById('tkr-nearhl');
  if(!badge){ badge=document.createElement('div'); badge.id='tkr-nearhl'; badge.style.cssText='padding:0 6px;font-size:9px;font-weight:700;letter-spacing:1px;border-radius:2px;display:none;margin-bottom:4px'; document.querySelector('.sstrip').appendChild(badge); }
  if(pHi&&last>=pHi*0.98){ badge.style.display='inline-block'; badge.style.background='rgba(0,200,83,.15)'; badge.style.color='var(--up)'; badge.style.border='1px solid var(--up)'; badge.textContent='↑ NEAR HIGH'; badge.title=`${(((last-pHi)/pHi)*100).toFixed(2)}% from period high`; }
  else if(pLo&&last<=pLo*1.02){ badge.style.display='inline-block'; badge.style.background='rgba(244,67,54,.15)'; badge.style.color='var(--dn)'; badge.style.border='1px solid var(--dn)'; badge.textContent='↓ NEAR LOW'; badge.title=`${(((last-pLo)/pLo)*100).toFixed(2)}% from period low`; }
  else { badge.style.display='none'; }

  // ── Stat strip click → explain the number ─────────────────────────────────
  document.querySelectorAll('.ss').forEach(el=>{
    el.style.cursor='pointer';
    el.onclick=()=>{
      const lbl=el.querySelector('.ss-l')?.textContent||'';
      const val=el.querySelector('.ss-v')?.textContent||'';
      const bar=document.getElementById('cmd-st'); if(!bar) return;
      let msg='';
      if(lbl==='PERIOD H') msg=`${_d.ticker||''} · period high ${val} · currently ${pHi?((last/pHi-1)*100).toFixed(2)+'% vs high':'—'}`;
      else if(lbl==='PERIOD L') msg=`${_d.ticker||''} · period low ${val} · currently ${pLo?((last/pLo-1)*100).toFixed(2)+'% vs low':'—'}`;
      else if(lbl==='ATR(14)') msg=`ATR ${val} · = ${lastATR&&last?(lastATR/last*100).toFixed(2)+'% of price':'—'} · expect ±${val} daily move`;
      else if(lbl==='MKT CAP') { const rank=(BB.secs||[]).filter(s=>s.total_shares&&s.market_price).sort((a,b)=>b.total_shares*b.market_price-a.total_shares*a.market_price).findIndex(s=>s.ticker===(_d.ticker||'')); msg=`${_d.ticker||''} · $${val} cap · rank #${rank>=0?rank+1:'?'} of ${BB.secs.length} on exchange`; }
      else if(lbl==='AVG VOL') msg=`${_d.ticker||''} · avg daily volume ${val} · today ${lc.volume?lc.volume.toLocaleString():'—'} (${lc.volume&&_d.avg_volume?((lc.volume/_d.avg_volume-1)*100).toFixed(1)+'% vs avg':'—'})`;
      else msg=`${lbl}  ${val}`;
      bar.textContent=msg; bar.style.color='var(--txt3)';
    };
  });

  // ── Destroy old charts ─────────────────────────────────────────────────────
  if(window._tkrDepthC){window._tkrDepthC.destroy();window._tkrDepthC=null;}
  Object.values(_ch).forEach(c => c && c.destroy()); _ch = {};

  // ── Price chart ────────────────────────────────────────────────────────────
  if(ctype === 'candle') {
    _ch.price = mkCandle(document.getElementById('tkr-c'), cs);
  } else {
    const ds = [{label:'Close',data:cl,borderColor:'#aa7700',borderWidth:1.5,pointRadius:0,fill:true,backgroundColor:'rgba(170,119,0,.05)',tension:.2}];
    if(_ovs.has('sma20')  && _d.sma20)   ds.push({label:'SMA20', data:_d.sma20,  borderColor:'#00e5ff',borderWidth:1,pointRadius:0,fill:false,tension:0,spanGaps:true});
    if(_ovs.has('sma50')  && _d.sma50)   ds.push({label:'SMA50', data:_d.sma50,  borderColor:'#ffd600',borderWidth:1,pointRadius:0,fill:false,tension:0,spanGaps:true});
    if(_ovs.has('sma100') && _d.sma100)  ds.push({label:'SMA100',data:_d.sma100, borderColor:'#e040fb',borderWidth:1,pointRadius:0,fill:false,tension:0,spanGaps:true});
    if(_ovs.has('vwap')   && _d.vwap)    ds.push({label:'VWAP',  data:_d.vwap,   borderColor:'#ff8c00',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false,tension:0,spanGaps:true});
    if(_ovs.has('bb') && _d.bb_upper) {
      ds.push({label:'BB+',data:_d.bb_upper,borderColor:'rgba(0,229,255,.35)',borderWidth:1,pointRadius:0,fill:false,tension:0,spanGaps:true,borderDash:[2,4]});
      ds.push({label:'BB-',data:_d.bb_lower,borderColor:'rgba(0,229,255,.35)',borderWidth:1,pointRadius:0,fill:'-1',backgroundColor:'rgba(0,229,255,.025)',tension:0,spanGaps:true,borderDash:[2,4]});
    }
    _ch.price = mkLine(document.getElementById('tkr-c'), dates, ds);
    // Chart hover → push OHLCV to status bar
    if(_ch.price){
      const origOnHover=_ch.price.options.onHover||(()=>{});
      _ch.price.options.plugins.tooltip.external = ctx=>{
        const bar=document.getElementById('cmd-st'); if(!bar) return;
        const pts=ctx.tooltip.dataPoints;
        if(!pts||!pts.length) return;
        const idx=pts[0].dataIndex;
        const c=cs[idx]; if(!c) return;
        bar.textContent=`${_d.ticker||''} · ${dates[idx]||''} · C:${f(c.close,4)}`;
        bar.style.color='var(--txt3)';
      };
      _ch.price.update('none');
    }
    const leg = [
      {c:'#aa7700',l:'PRICE'},
      _ovs.has('sma20')  && {c:'#00e5ff',l:'SMA20'},
      _ovs.has('sma50')  && {c:'#ffd600',l:'SMA50'},
      _ovs.has('sma100') && {c:'#e040fb',l:'SMA100'},
      _ovs.has('vwap')   && {c:'#ff8c00',l:'VWAP'},
      _ovs.has('bb')     && {c:'rgba(0,229,255,.6)',l:'BB'},
    ].filter(Boolean);
    document.getElementById('tkr-leg').innerHTML = leg.map(x=>
      `<span style="display:flex;align-items:center;gap:3px"><span style="display:inline-block;width:12px;height:2px;background:${x.c}"></span>${x.l}</span>`
    ).join('');
  }

  // ── MACD ───────────────────────────────────────────────────────────────────
  if(_d.macd_line) {
    const lastM = _d.macd_line[_d.macd_line.length-1];
    document.getElementById('macd-val').textContent = lastM!=null?' '+f(lastM,4):'';
    const hcols = (_d.macd_hist||[]).map(v=>v>=0?'rgba(0,200,83,.6)':'rgba(244,67,54,.6)');
    _ch.macd = new Chart(document.getElementById('tkr-macd'),{type:'bar',
      data:{labels:dates,datasets:[
        {data:_d.macd_hist,backgroundColor:hcols,borderWidth:0,order:2},
        {type:'line',data:_d.macd_line,borderColor:'#00e5ff',borderWidth:1,pointRadius:0,fill:false,order:1,spanGaps:true},
        {type:'line',data:_d.macd_signal,borderColor:'#ff8c00',borderWidth:1,pointRadius:0,fill:false,order:1,spanGaps:true}
      ]},options:{responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{...TT}},
        scales:{x:{display:false},y:{grid:{color:'#1a1a1a'},position:'right',ticks:{maxTicksLimit:3,color:'#444'}}}}});
  }

  // ── RSI ────────────────────────────────────────────────────────────────────
  if(_d.rsi14) {
    const lastR = _d.rsi14.filter(v=>v!=null).pop();
    const rv = document.getElementById('rsi-val');
    rv.textContent = lastR ? ' '+lastR.toFixed(1) : '';
    rv.style.color = lastR>70?'var(--dn)':lastR<30?'var(--up)':'var(--txt2)';
    // Glow the RSI wbar when extreme
    const rsiWbar=rv.closest('.win');
    if(rsiWbar){ rsiWbar.style.borderColor=lastR>70?'rgba(244,67,54,.45)':lastR<30?'rgba(0,200,83,.45)':''; }
    _ch.rsi = new Chart(document.getElementById('tkr-rsi'),{type:'line',
      data:{labels:dates,datasets:[{data:_d.rsi14,borderColor:'#e040fb',borderWidth:1.2,pointRadius:0,fill:false,tension:.2,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        plugins:{legend:{display:false},tooltip:{...TT}},
        scales:{x:{display:false},y:{min:0,max:100,grid:{color:'#1a1a1a'},position:'right',ticks:{color:'#444',maxTicksLimit:3}}}}});
  }

  // ── Volume ─────────────────────────────────────────────────────────────────
  _ch.vol = new Chart(document.getElementById('tkr-vc'),{type:'bar',
    data:{labels:dates,datasets:[
      {data:vols,backgroundColor:cs.map(c=>c._synthetic?'rgba(0,0,0,0)':c.close>=c.open?'rgba(0,200,83,.5)':'rgba(244,67,54,.5)'),borderWidth:0},
      {type:'line',data:_d.vol_ma20,borderColor:'#ff8c00',borderWidth:1,pointRadius:0,fill:false,spanGaps:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{...TT}},
      scales:{x:{display:false},y:{grid:{color:'#1a1a1a'},position:'right',ticks:{maxTicksLimit:3,color:'#444'}}}}});

  // ── Order Book + Microstructure ────────────────────────────────────────────
  if(obR.ok) {
    const sp = renderOB('tkr-ob', obR.d);
    document.getElementById('tkr-spr').textContent = sp ? `SPR ${sp}` : '';
    const bids=obR.d.bids||[], asks=obR.d.asks||[];
    const bq=bids.reduce((s,b)=>s+b.quantity,0), aq=asks.reduce((s,a)=>s+a.quantity,0);
    // OB pressure badge
    const obBar=document.getElementById('tkr-spr');
    const imb2=(bq+aq)>0?(bq-aq)/(bq+aq)*100:0;
    const pressureBadge=document.getElementById('tkr-ob-pressure')||(()=>{const d=document.createElement('span');d.id='tkr-ob-pressure';d.style.cssText='font-size:8px;font-weight:700;letter-spacing:.5px;padding:0 4px;border-radius:2px';obBar.parentNode.insertBefore(d,obBar);return d;})();
    if(imb2>60){pressureBadge.textContent='BUY PRESSURE';pressureBadge.style.color='var(--up)';pressureBadge.style.background='rgba(0,200,83,.12)';}
    else if(imb2<-60){pressureBadge.textContent='SELL PRESSURE';pressureBadge.style.color='var(--dn)';pressureBadge.style.background='rgba(244,67,54,.12)';}
    else{pressureBadge.textContent='';}
    // Wall detection
    const allQty=[...bids,...asks].map(x=>x.quantity); const avgQ=allQty.reduce((s,v)=>s+v,0)/Math.max(allQty.length,1);
    const walls=[...bids,...asks].filter(x=>x.quantity>avgQ*3);
    if(walls.length){const topWall=walls.sort((a,b)=>b.quantity-a.quantity)[0]; if(obBar) obBar.textContent=(sp?`SPR ${sp}  `:'')+`⚠ WALL @$${f(topWall.price,4)}`;}
    // Render depth chart
    renderDepthChart(bids, asks);
    const imb = (bq-aq)/Math.max(bq+aq,1)*100;
    const wallCount = countWalls(bids,asks);
    const depthConc = bids.length > 0 ? (bids.slice(0,3).reduce((s,b)=>s+b.quantity,0)/Math.max(bq,1)*100).toFixed(1) : '—';
    document.getElementById('tkr-micro').innerHTML = `
      <div class="micro-grid">
        <span class="k">BID DEPTH</span><span class="v up">${fk(bq)}</span>
        <span class="k">ASK DEPTH</span><span class="v dn">${fk(aq)}</span>
        <span class="k">IMBALANCE</span><span class="v" style="color:${gc(imb)}">${imb.toFixed(1)}%</span>
        <span class="k">SPREAD %</span><span class="v yel">${sp?sp+'%':'—'}</span>
        <span class="k">MID</span><span class="v wht">${f(obR.d.mid,4)}</span>
        <span class="k">TOP3 CONC</span><span class="v">${depthConc}%</span>
        <span class="k">WALLS</span><span class="v ${wallCount>0?'org':''}">${wallCount}</span>
        <span class="k">BID LVLS</span><span class="v dim">${bids.length}</span>
      </div>`;
  }

  // ── Risk Profile ───────────────────────────────────────────────────────────
  if(sR.ok) {
    const d = sR.d;
    const mr = d.mean_reversion_score;
    const dv = d.downside_vol;
    const vs = d.vol_spike;
    // Vol percentile vs exchange (approx: compare to all securities' volatility from BB.secs)
    const thisVol = d.volatility_ann_pct;
    const mrColor = mr != null ? (mr > 2 ? 'var(--dn)' : mr > 1 ? 'var(--yel)' : mr < -2 ? 'var(--up)' : 'var(--txt2)') : 'var(--txt3)';
    const mrLabel = mr != null ? (mr > 2 ? 'OVERBOUGHT' : mr > 1 ? 'STRETCHED HI' : mr < -2 ? 'OVERSOLD' : mr < -1 ? 'STRETCHED LO' : 'NEUTRAL') : '—';
    document.getElementById('tkr-risk').innerHTML = `
      <div class="micro-grid">
        <span class="k">ANN VOL</span><span class="v yel">${thisVol != null ? thisVol+'%' : '—'}</span>
        <span class="k">DOWNSIDE VOL</span><span class="v ${dv>30?'dn':dv>15?'yel':'up'}">${dv != null ? dv+'%' : '—'}</span>
        <span class="k">MR Z-SCORE</span><span class="v" style="color:${mrColor}">${mr != null ? mr.toFixed(2) : '—'}</span>
        <span class="k">MR SIGNAL</span><span class="v" style="color:${mrColor};font-size:9px">${mrLabel}</span>
        <span class="k">VOL SPIKE</span><span class="v ${vs>2?'org':vs>1.5?'yel':'dim'}">${vs != null ? vs.toFixed(2)+'x' : '—'}</span>
        <span class="k">MAX DD</span><span class="v dn">${d.max_drawdown_pct != null ? '-'+d.max_drawdown_pct+'%' : '—'}</span>
        <span class="k">SHARPE</span><span class="v ${(d.sharpe||0)>=0?'up':'dn'}">${d.sharpe != null ? f(d.sharpe,2) : '—'}</span>
        <span class="k">NEAR HIGH</span><span class="v ${d.near_high?'up':'dim'}">${d.near_high ? 'YES ▲' : 'NO'}</span>
      </div>`;
  }

  // ── Shareholder Intelligence ───────────────────────────────────────────────
  if(hiR.ok && hiR.d.stats) {
    const st = hiR.d.stats;
    const histBuckets = hiR.d.histogram || {};
    const giniColor = st.gini > 0.7 ? 'var(--dn)' : st.gini > 0.4 ? 'var(--yel)' : 'var(--up)';
    document.getElementById('tkr-hi').innerHTML = `
      <div class="micro-grid">
        <span class="k">HOLDERS</span><span class="v wht">${(st.num_holders||0).toLocaleString()}</span>
        <span class="k">HHI</span><span class="v ${st.hhi>2500?'dn':st.hhi>1500?'yel':'up'}">${st.hhi}</span>
        <span class="k">TOP 1%</span><span class="v">${st.top1_pct}%</span>
        <span class="k">TOP 5%</span><span class="v">${st.top5_pct}%</span>
        <span class="k">WHALES</span><span class="v ${st.whale_count>0?'org':''}">${st.whale_count}</span>
        <span class="k">GINI</span><span class="v" style="color:${giniColor}">${st.gini}</span>
        <span class="k">FLOAT</span><span class="v dim">${hiR.d.float_pct!=null?hiR.d.float_pct+'%':'—'}</span>
        <span class="k">TOTAL SH</span><span class="v dim">${fk(hiR.d.total_shares)}</span>
      </div>`;
    // Shareholder list
    const holders = hiR.d.holders || [];
    const total = hiR.d.total_held || 1;
    document.getElementById('tkr-sh').innerHTML = holders.slice(0,25).map(h=>{
      const pct = (h.quantity/total*100).toFixed(1);
      const isWhale = h.quantity/total > 0.10;
      return `<div style="padding:2px 8px;border-bottom:1px solid rgba(46,46,46,.5)">
        <div style="display:flex;justify-content:space-between;font-size:10px">
          <span class="${isWhale?'org dim':'dim'}">…${h.user_id.slice(-8)}</span>
          <span class="wht">${h.quantity.toLocaleString()} <span class="dim">${pct}%</span></span>
        </div>
        <div style="height:2px;background:${isWhale?'var(--org)':'var(--sel)'};width:${Math.max(parseFloat(pct),0.5)}%;opacity:.6;margin-top:2px"></div>
      </div>`;
    }).join('') || '<div class="loading">NO DATA</div>';
  }
};

function renderDepthChart(bids, asks) {
  const canvas = document.getElementById('tkr-depth');
  if(!canvas) return;
  if(window._tkrDepthC) { window._tkrDepthC.destroy(); window._tkrDepthC=null; }
  // Sort bids desc, asks asc, compute cumulative
  const sb = [...bids].sort((a,b)=>b.price-a.price);
  const sa = [...asks].sort((a,b)=>a.price-b.price);
  let cumB=0, cumA=0;
  const bidPts = sb.map(b=>({x:b.price, y:(cumB+=b.quantity)}));
  const askPts = sa.map(a=>({x:a.price, y:(cumA+=a.quantity)}));
  window._tkrDepthC = new Chart(canvas, {
    type:'line',
    data:{datasets:[
      {label:'BID',data:bidPts,borderColor:'rgba(0,200,83,.8)',backgroundColor:'rgba(0,200,83,.12)',
       borderWidth:1.5,pointRadius:0,fill:true,stepped:'after',tension:0},
      {label:'ASK',data:askPts,borderColor:'rgba(244,67,54,.8)',backgroundColor:'rgba(244,67,54,.12)',
       borderWidth:1.5,pointRadius:0,fill:true,stepped:'before',tension:0},
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      plugins:{legend:{display:false},tooltip:{...TT,callbacks:{
        label:c=>`${c.dataset.label}: ${c.parsed.y.toLocaleString()} sh @ $${f(c.parsed.x,4)}`
      }}},
      scales:{
        x:{type:'linear',grid:{color:'#1a1a1a'},ticks:{color:'#444',maxTicksLimit:6,callback:v=>f(v,2)}},
        y:{grid:{color:'#1a1a1a'},ticks:{color:'#444',maxTicksLimit:4,callback:v=>fk(v)}},
      }
    }
  });
}

// ── Recent prints feed ───────────────────────────────────────────────────────
let _tkrLastPrintIds = new Set();
async function loadTkrPrints(ticker) {
  const el = document.getElementById('tkr-prints'); if(!el) return;
  const r = await api(`/api/transactions?type=Trade&limit=80`);
  if(!r.ok || !Array.isArray(r.d)) { el.innerHTML='<div class="loading">—</div>'; return; }
  const trades = r.d.filter(tx=>tx.ticker===ticker);
  document.getElementById('tkr-print-ct').textContent = trades.length ? ` — ${trades.length}` : '';
  if(!trades.length){ el.innerHTML='<div style="padding:8px;font-size:9px;color:var(--txt3)">No recent trades</div>'; return; }

  // Track new vs known
  const newIds = new Set(trades.map(tx=>tx.id||tx.timestamp));
  const isFirstLoad = _tkrLastPrintIds.size === 0;

  // Compute VWAP
  const tot=trades.reduce((s,tx)=>s+Math.abs(tx.quantity||0),0);
  const vwapVal=tot>0?trades.reduce((s,tx)=>s+(tx.price||0)*Math.abs(tx.quantity||0),0)/tot:0;
  const midPrice = BB.secs.find(s=>s.ticker===ticker)?.market_price;

  // Count buys vs sells for imbalance
  const buyVol = trades.filter(tx=>(tx.amount||0)<0).reduce((s,tx)=>s+Math.abs(tx.quantity||0),0);
  const sellVol = trades.filter(tx=>(tx.amount||0)>=0).reduce((s,tx)=>s+Math.abs(tx.quantity||0),0);
  const imbalPct = tot>0 ? ((buyVol-sellVol)/tot*100) : 0;

  el.innerHTML = trades.map(tx=>{
    const isBuy=(tx.amount||0)<0;
    const isNew = !isFirstLoad && !_tkrLastPrintIds.has(tx.id||tx.timestamp);
    const dt=tx.timestamp?new Date(tx.timestamp):null;
    const time=dt?dt.toLocaleTimeString('en-GB',{hour12:false}):'—';
    const qty=Math.abs(tx.quantity||0);
    const isLarge=qty>=100;
    const priceDelta = midPrice && tx.price ? ((tx.price-midPrice)/midPrice*100) : null;
    return `<div class="${isNew?(isBuy?'flash-up':'flash-dn'):''}" style="display:flex;align-items:center;gap:4px;padding:2px 6px;border-bottom:1px solid rgba(46,46,46,.3);font-size:9px;${isLarge?'background:rgba(255,140,0,.04)':''}">
      <span style="color:var(--txt3);width:36px;font-variant-numeric:tabular-nums">${time}</span>
      <span style="font-weight:700;color:${isBuy?'var(--up)':'var(--dn)'};width:26px">${isBuy?'BID':'ASK'}</span>
      <span style="color:var(--wht);width:40px;text-align:right;font-variant-numeric:tabular-nums;${isLarge?'font-weight:700':''}">${qty.toLocaleString()}</span>
      <span style="color:var(--yel);flex:1;text-align:right;font-variant-numeric:tabular-nums">$${f(tx.price||0,4)}</span>
      <span style="width:36px;text-align:right;font-size:8px;color:${priceDelta!=null?(priceDelta>=0?'var(--up)':'var(--dn)'):'var(--txt3)'}">${priceDelta!=null?(priceDelta>=0?'+':'')+priceDelta.toFixed(2)+'%':''}</span>
      ${isLarge?'<span style="font-size:7px;color:var(--org);font-weight:700;border:1px solid var(--org);padding:0 2px">BLK</span>':''}
    </div>`;
  }).join('')
  + `<div style="padding:4px 6px;font-size:9px;border-top:1px solid var(--bdr);display:flex;gap:12px;flex-wrap:wrap">
    <span>VWAP <span style="color:var(--cyn);font-weight:700">$${f(vwapVal,4)}</span></span>
    <span style="color:${imbalPct>0?'var(--up)':'var(--dn)'}">IMBAL ${imbalPct>=0?'+':''}${imbalPct.toFixed(1)}%</span>
    <span style="color:var(--txt3)">${trades.length} prints · ${tot.toLocaleString()} sh</span>
  </div>`;

  _tkrLastPrintIds = newIds;
}

// ── TSE Ticker loader — Atlas for market data, TSE native for trades ─────
async function _loadTSETicker(ticker, days, ctype) {
  const set = (id, v, cls) => { const e=document.getElementById(id); if(!e) return; e.textContent=v; if(cls) e.className=e.className.replace(/up|dn|yel/g,'')+' '+cls; };

  // Atlas uses TSE:ECO format; TSE native API uses bare ECO
  const atlasTicker = ticker.startsWith('TSE:') ? ticker : `TSE:${ticker}`;
  const sym         = ticker.startsWith('TSE:') ? ticker.slice(4) : ticker;

  // Destroy old charts
  if(window._tkrDepthC){window._tkrDepthC.destroy();window._tkrDepthC=null;}
  Object.values(_ch).forEach(c=>c&&c.destroy()); _ch={};

  // Fetch in parallel — Atlas OHLCV sometimes returns nothing for TSE tickers,
  // so we also fire TSE native candles + live market summary as fallbacks.
  const [sR, tseCanR, tseMktR, obR, tradesR] = await Promise.all([
    api(`/api/ticker_stats/${atlasTicker}?days=${days}`),
    api(`/api/tse/candles/${sym}?interval=1h&limit=720`),
    api(`/api/tse/market/${sym}`),
    api(`/api/orderbook/${atlasTicker}`),
    api(`/api/tse/trades/${sym}?limit=50`),
  ]);

  // ── Build candle array — prefer Atlas, fall back to TSE native ───────────
  let rawCandles = [];
  let statsD = {};
  if(sR.ok && sR.d && Array.isArray(sR.d.candles) && sR.d.candles.length >= 2) {
    rawCandles = sR.d.candles;
    statsD     = sR.d;
  } else if(tseCanR.ok) {
    const tseCs = Array.isArray(tseCanR.d) ? tseCanR.d
                : Array.isArray(tseCanR.d?.candles) ? tseCanR.d.candles : [];
    // Hourly candles → aggregate to daily OHLCV
    const byDay = {};
    for(const c of tseCs) {
      const dt = (c.timestamp||c.date||'').slice(0,10);
      if(!dt || !c.close) continue;
      const cl2 = parseFloat(c.close||0);
      if(!byDay[dt]) byDay[dt] = {date:dt, open:parseFloat(c.open||cl2), high:cl2, low:cl2, close:cl2, volume:0};
      byDay[dt].high   = Math.max(byDay[dt].high, parseFloat(c.high||cl2));
      byDay[dt].low    = Math.min(byDay[dt].low,  parseFloat(c.low||cl2));
      byDay[dt].close  = cl2;  // last hour of day wins
      byDay[dt].volume += parseInt(c.volume||0);
    }
    rawCandles = Object.values(byDay).filter(c=>c.close>0).sort((a,b)=>a.date.localeCompare(b.date));
  }

  // Live price from TSE market summary (most accurate current price)
  const livePx = tseMktR.ok ? parseFloat(tseMktR.d?.last_price || tseMktR.d?.current_price || 0) : 0;

  // ── Header KPIs ──────────────────────────────────────────────────────────
  if(rawCandles.length) {
    const d  = statsD;
    const _ff = forwardFillCandles(rawCandles, {});
    const cs = _ff.candles;
    const cl = cs.map(c=>c.close);
    // Splice live price into last point so chart tip matches header
    if(livePx > 0 && cs.length) { cs[cs.length-1].close = livePx; cl[cl.length-1] = livePx; }
    const px = livePx > 0 ? livePx : (cl.length ? cl[cl.length-1] : 0);

    const chgPct = cl.length >= 2 && cl[0]
      ? +((px - cl[0]) / cl[0] * 100).toFixed(2) : null;

    document.getElementById('tkr-px').textContent = f(px,4);
    document.getElementById('tkr-px').style.color  = gc(chgPct??0);
    set('tkr-chg',  chgPct!=null ? fp(chgPct) : '—');
    document.getElementById('tkr-chg').style.color = gc(chgPct??0);
    set('tkr-vol',  d.volatility_ann_pct != null ? f(d.volatility_ann_pct,1)+'%' : '—');
    set('tkr-shrp', d.sharpe != null ? f(d.sharpe,2) : '—');
    set('tkr-mdd',  d.max_drawdown_pct  != null ? f(d.max_drawdown_pct,2)+'%' : '—');
    document.getElementById('tkr-frz').style.display = 'none';

    // Stat strip
    if(cs.length) {
      set('ts-o', f(cs[0].open||cs[0].close,4));
      set('ts-h', f(Math.max(...cs.map(c=>c.high||c.close)),4));
      set('ts-l', f(Math.min(...cs.map(c=>c.low||c.close)),4));
      set('ts-c', f(px,4));
      const totalVol = cs.reduce((s,c)=>s+(c.volume||0),0);
      set('ts-v',  totalVol.toLocaleString());
      set('ts-av', f(totalVol/cs.length,0));
      set('ts-ph', f(Math.max(...cl),4));
      set('ts-pl', f(Math.min(...cl),4));
      set('ts-atr', d.atr14 != null ? f(d.atr14,4) : '—');
      const sec=(BB.secs||[]).find(s=>s.ticker===atlasTicker)||{};
      set('ts-mc', sec.total_shares ? fk(sec.total_shares*px) : (d.market_cap ? fk(d.market_cap) : '—'));
    }

    // ── Price chart ────────────────────────────────────────────────────────
    if(cs.length >= 2) {
      const vols  = cs.map(c=>c.volume||0);
      const dates = cs.map(c=>c.date||'—');
      if(ctype==='candle') {
        _ch.price = mkCandle(document.getElementById('tkr-c'), cs.map(c=>({open:c.open||c.close,high:c.high||c.close,low:c.low||c.close,close:c.close,date:c.date||'—'})));
      } else {
        const ds=[{label:'Close',data:cl,borderColor:'#00e5ff',borderWidth:1.5,pointRadius:0,fill:true,backgroundColor:'rgba(0,229,255,.04)',tension:.2}];
        _ch.price = mkLine(document.getElementById('tkr-c'), dates, ds);
    // Chart hover → push OHLCV to status bar
    if(_ch.price){
      const origOnHover=_ch.price.options.onHover||(()=>{});
      _ch.price.options.plugins.tooltip.external = ctx=>{
        const bar=document.getElementById('cmd-st'); if(!bar) return;
        const pts=ctx.tooltip.dataPoints;
        if(!pts||!pts.length) return;
        const idx=pts[0].dataIndex;
        const c=cs[idx]; if(!c) return;
        bar.textContent=`${_d.ticker||''} · ${dates[idx]||''} · C:${f(c.close,4)}`;
        bar.style.color='var(--txt3)';
      };
      _ch.price.update('none');
    }
      }
      _ch.vol = mkVol(document.getElementById('tkr-v'), dates, vols);
      if(cl.length >= 26){ const m=calcMACD(cl); if(m) _ch.macd=mkMACD(document.getElementById('tkr-macd'),dates,m); }
      if(cl.length >= 14){ const r=calcRSI(cl,14); if(r) _ch.rsi=mkRSI(document.getElementById('tkr-rsi'),dates,r); }
    }
  }

  // ── Order book — Atlas /orderbook/TSE:ECO ─────────────────────────────────
  if(obR.ok && obR.d) {
    const raw  = obR.d;
    const bids = (raw.bids||raw.buy_orders||[]).map(l=>({price:parseFloat(l.price||l[0]||0),quantity:parseInt(l.quantity||l.size||l[1]||0)})).filter(b=>b.price>0);
    const asks = (raw.asks||raw.sell_orders||[]).map(l=>({price:parseFloat(l.price||l[0]||0),quantity:parseInt(l.quantity||l.size||l[1]||0)})).filter(a=>a.price>0);
    _buildDepthChart(bids, asks);
    _fillOBTable(bids, asks);
  }

  // TSE — holders not available
  document.getElementById('tkr-hi').innerHTML='<div style="padding:8px;font-size:9px;color:var(--txt3)">Holder data not available for TSE securities</div>';
  document.getElementById('tkr-sh').innerHTML='<div style="padding:8px;font-size:9px;color:var(--txt3)">—</div>';

  // ── Recent prints — TSE native trades endpoint ────────────────────────────
  const el = document.getElementById('tkr-prints'); if(!el) return;
  if(tradesR.ok && Array.isArray(tradesR.d) && tradesR.d.length) {
    const trades = tradesR.d;
    document.getElementById('tkr-print-ct').textContent = ` — ${trades.length}`;
    const tot      = trades.reduce((s,t)=>s+(t.quantity||0),0);
    const vwapVal  = tot>0 ? trades.reduce((s,t)=>s+(t.price||0)*(t.quantity||0),0)/tot : 0;
    el.innerHTML   = trades.map(t => {
      const px2=parseFloat(t.price||0), qty=t.quantity||0;
      const ts=t.executed_ts||t.timestamp||t.ts||'';
      const time=ts?new Date(ts).toLocaleTimeString('en-GB',{hour12:false}):'—';
      return `<div style="display:flex;align-items:center;gap:4px;padding:2px 6px;border-bottom:1px solid rgba(46,46,46,.3);font-size:9px">
        <span style="color:var(--txt3);width:36px;font-variant-numeric:tabular-nums">${time}</span>
        <span style="color:var(--cyn);font-weight:700;width:28px">TSE</span>
        <span style="color:var(--wht);width:40px;text-align:right;font-variant-numeric:tabular-nums">${qty.toLocaleString()}</span>
        <span style="color:var(--yel);flex:1;text-align:right;font-variant-numeric:tabular-nums">$${f(px2,4)}</span>
      </div>`;
    }).join('')
    + `<div style="padding:4px 6px;font-size:9px;border-top:1px solid var(--bdr);display:flex;gap:12px">
        <span>VWAP <span style="color:var(--cyn);font-weight:700">$${f(vwapVal,4)}</span></span>
        <span style="color:var(--txt3)">${trades.length} prints · ${tot.toLocaleString()} sh</span>
       </div>`;
  } else {
    el.innerHTML='<div style="padding:8px;font-size:9px;color:var(--txt3)">No recent trades</div>';
  }
}

// Helper: fill OB table rows (shared between NER and TSE)
function _fillOBTable(bids, asks) {
  const bidEl=document.getElementById('tkr-ob-bids'), askEl=document.getElementById('tkr-ob-asks');
  if(!bidEl||!askEl) return;
  bidEl.innerHTML=bids.slice(0,10).map(b=>`<tr><td class="up">${f(b.price,4)}</td><td>${b.quantity.toLocaleString()}</td></tr>`).join('');
  askEl.innerHTML=asks.slice(0,10).map(a=>`<tr><td class="dn">${f(a.price,4)}</td><td>${a.quantity.toLocaleString()}</td></tr>`).join('');
}

window.tkrQuickOrder = function(side) {
  const ticker = document.getElementById('tkr-sel')?.value; if(!ticker) return;
  sw('ord');
  setTimeout(()=>{
    const tkSel=document.getElementById('op-tk');
    if(tkSel){tkSel.value=ticker;if(window.opTickerChg)opTickerChg();}
    if(window.opSide) opSide(side);
  },300);
};

function countWalls(bids, asks) {
  const bq=bids.reduce((s,b)=>s+b.quantity,0), aq=asks.reduce((s,a)=>s+a.quantity,0);
  const avgB=bq/Math.max(bids.length,1), avgA=aq/Math.max(asks.length,1);
  return bids.filter(b=>b.quantity>avgB*3).length + asks.filter(a=>a.quantity>avgA*3).length;
}

// Auto-refresh prints every 8s when page is active
setInterval(()=>{
  if(BB.activePanel==='tkr' && _d?.ticker) loadTkrPrints(_d.ticker);
}, 8000);

// ── Persist last viewed ticker + period to sessionStorage ─────────────────
const _origLoad = window.PAGE_tkr_load;
window.PAGE_tkr_load = async function(ticker, exchange){
  if(ticker){ try{ sessionStorage.setItem('bb_last_ticker', ticker+(exchange?'|'+exchange:'')); }catch(e){} }
  return _origLoad(ticker, exchange);
};

// ── Keyboard: , / .  → prev/next ticker; [ / ] → step period ─────────────
document.addEventListener('keydown', e=>{
  if(BB.activePanel!=='tkr') return;
  const cmd=document.getElementById('cmd-in');
  if(document.activeElement===cmd) return;
  const PERIODS=['7','14','30','60','90','180'];
  if(e.key===','||e.key==='.'){ 
    e.preventDefault();
    const secs=BB.secs||[]; if(!secs.length) return;
    const cur=document.getElementById('tkr-sel')?.value||'';
    const idx=secs.findIndex(s=>s.ticker===cur);
    const next=e.key==='.'?secs[(idx+1)%secs.length]:secs[(idx-1+secs.length)%secs.length];
    if(next) PAGE_tkr_load(next.ticker, next.exchange||'NER');
  }
  if(e.key==='['||e.key===']'){
    e.preventDefault();
    const rng=document.getElementById('tkr-rng'); if(!rng) return;
    const idx=PERIODS.indexOf(rng.value);
    const next=e.key===']'?PERIODS[Math.min(idx+1,PERIODS.length-1)]:PERIODS[Math.max(idx-1,0)];
    rng.value=next;
    const t=document.getElementById('tkr-sel')?.value;
    if(t) PAGE_tkr_load(t, document.getElementById('tkr-exch')?.value||'NER');
  }
});

// ── On page show: restore last viewed ticker ──────────────────────────────
const _origOnShow = window.PAGE_tkr_onShow;
window.PAGE_tkr_onShow = function(ticker, exchange){
  if(!ticker){
    try{
      const last=sessionStorage.getItem('bb_last_ticker');
      if(last){ const parts=last.split('|'); ticker=parts[0]; exchange=parts[1]||null; }
    }catch(e){}
  }
  return _origOnShow(ticker, exchange);
};
})();
</script>
