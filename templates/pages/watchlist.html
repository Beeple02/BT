<!-- F7: WATCHLIST — Smart monitoring with RSI/volume/volatility alerts -->
<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
<div class="frow">
  <div class="ff"><label>ADD TICKER</label>
    <select id="wl-sel" style="min-width:160px"><option value="">SELECT</option></select>
  </div>
  <div class="ff"><label>ALERT ABOVE</label><input type="number" id="wl-ahi" step="0.01" placeholder="—" style="width:76px"></div>
  <div class="ff"><label>ALERT BELOW</label><input type="number" id="wl-alo" step="0.01" placeholder="—" style="width:76px"></div>
  <div class="ff"><label>RSI ABOVE</label><input type="number" id="wl-rhi" step="1" placeholder="70" style="width:54px"></div>
  <div class="ff"><label>RSI BELOW</label><input type="number" id="wl-rlo" step="1" placeholder="30" style="width:54px"></div>
  <button class="btn on" onclick="wlAdd()">+ WATCH</button>
  <button class="btn" onclick="wlRefresh()">REFRESH</button>
  <span style="align-self:flex-end;font-size:9px;color:var(--txt3);padding-bottom:4px;margin-left:8px">Auto-refresh every 30s</span>
</div>

<div class="wrow" style="flex:1">
  <div class="win" style="width:400px;border-right:0">
    <div class="wbar">
      <div class="wbar-l"><span class="wnum">1</span><span class="wtitle">WATCHLIST</span><span class="wsub" id="wl-count"></span></div>
      <div class="wbar-r"><span id="wl-last-upd" style="font-size:9px;color:var(--txt3)"></span></div>
    </div>
    <div class="scroll" id="wl-list"><div class="loading">EMPTY — ADD TICKERS</div></div>
  </div>

  <div class="win" style="flex:1;border-right:0">
    <div class="wbar"><div class="wbar-l"><span class="wnum">2</span><span class="wtitle">QUICK CHART</span><span class="wsub" id="wl-ct"></span></div></div>
    <div class="chart-wrap"><canvas id="wl-c"></canvas></div>
  </div>

  <div class="wcol" style="width:230px">
    <div class="win" style="flex:1;border-bottom:0">
      <div class="wbar"><div class="wbar-l"><span class="wnum">3</span><span class="wtitle">WATCHLIST STATS</span></div></div>
      <div style="padding:8px;font-size:11px" id="wl-stats"><div class="loading">—</div></div>
    </div>
    <div class="win" style="flex:1;border-top:0">
      <div class="wbar"><div class="wbar-l"><span class="wnum">4</span><span class="wtitle">VOLATILITY RANK</span></div></div>
      <div class="scroll" id="wl-vol-rank"><div class="loading">—</div></div>
    </div>
  </div>
</div>
</div>

<script>
(function(){
let _wlC=null, _rsiCache={};

window.PAGE_wl_onShow=function(){
  populateSel('wl-sel');
  wlRefresh();
};

window.wlAdd=function(){
  const t=document.getElementById('wl-sel').value; if(!t) return;
  if(BB.watchlist.find(w=>w.ticker===t)) return;
  const hi  =parseFloat(document.getElementById('wl-ahi').value)||null;
  const lo  =parseFloat(document.getElementById('wl-alo').value)||null;
  const rhi =parseFloat(document.getElementById('wl-rhi').value)||null;
  const rlo =parseFloat(document.getElementById('wl-rlo').value)||null;
  BB.watchlist.push({ticker:t,price:null,prev:null,hi,lo,rhi,rlo,rsi:null});
  document.getElementById('wl-ahi').value='';document.getElementById('wl-alo').value='';
  document.getElementById('wl-rhi').value='';document.getElementById('wl-rlo').value='';
  wlRefresh();
};

window.wlRefresh=async function(){
  if(!BB.watchlist.length){
    document.getElementById('wl-list').innerHTML='<div class="loading">EMPTY — ADD TICKERS ABOVE</div>';
    document.getElementById('wl-count').textContent='';
    document.getElementById('wl-stats').innerHTML='<div class="loading">—</div>';
    document.getElementById('wl-vol-rank').innerHTML='<div class="loading">—</div>';
    return;
  }
  document.getElementById('wl-count').textContent=` (${BB.watchlist.length})`;

  // Fetch current prices + RSI from ticker stats
  await Promise.all(BB.watchlist.map(async w=>{
    const isTse=w.ticker.startsWith('TSE:');
    const sec=BB.secs.find(s=>s.ticker===w.ticker);
    w.prev=w.price;
    // Feature 10: TSE tickers pull live price from market_price endpoint
    // (BB.secs may not carry TSE prices if exchange feed is NER-only)
    if(isTse){
      const pr=await api(`/api/market_price/${w.ticker}`);
      if(pr.ok&&pr.d.market_price!=null) w.price=pr.d.market_price;
      else w.price=sec?.market_price??w.price;
    } else {
      w.price=sec?.market_price??w.price;
    }
    // Fetch RSI + period chg% from 30D stats (cached)
    if(!_rsiCache[w.ticker]||Date.now()-_rsiCache[w.ticker].ts>60000){
      const r=await api(`/api/ticker_stats/${w.ticker}?days=30`);
      if(r.ok&&r.d.rsi14){
        const rsiArr=r.d.rsi14.filter(v=>v!=null);
        w.rsi=rsiArr.length?rsiArr[rsiArr.length-1]:null;
        w.annVol=r.d.volatility_ann_pct||null;
        w.chgPct=r.d.price_chg_pct??null; // period return from ticker_stats
        _rsiCache[w.ticker]={ts:Date.now(),rsi:w.rsi,annVol:w.annVol,chgPct:w.chgPct};
      }
    } else {
      w.rsi=_rsiCache[w.ticker].rsi;
      w.annVol=_rsiCache[w.ticker].annVol;
      w.chgPct=_rsiCache[w.ticker].chgPct??null;
    }
  }));

  document.getElementById('wl-last-upd').textContent='Updated '+new Date().toLocaleTimeString('en-GB');
  renderWL();
  renderWLStats();
  renderVolRank();
};

function renderWL(){
  document.getElementById('wl-list').innerHTML=BB.watchlist.map((w,i)=>{
    const chg=w.chgPct??0; // 30D period return from server
    const aH=w.hi&&w.price>w.hi, aL=w.lo&&w.price<w.lo;
    const aRH=w.rhi!=null&&w.rsi!=null&&w.rsi>w.rhi, aRL=w.rlo!=null&&w.rsi!=null&&w.rsi<w.rlo;
    const anyAlert=aH||aL||aRH||aRL;
    const rsiColor=w.rsi>70?'var(--dn)':w.rsi<30?'var(--up)':'var(--txt3)';
    return `<div style="display:flex;align-items:center;padding:4px 8px;border-bottom:1px solid rgba(46,46,46,.4);gap:5px;font-size:11px;${anyAlert?'background:rgba(255,140,0,.06)':''};cursor:pointer"
        onclick="wlLoadChart('${w.ticker}')">
      <span style="width:58px;font-weight:700;color:var(--wht)">${w.ticker}</span>
      <span style="width:72px;font-variant-numeric:tabular-nums;color:${anyAlert?'var(--org)':'var(--wht)'};font-weight:${anyAlert?700:400}">${f(w.price)}</span>
      <span style="width:64px;text-align:right;font-weight:600;color:${gc(chg)}">${fp(chg)}</span>
      <span style="width:42px;text-align:right;font-size:9px;color:${rsiColor}">${w.rsi!=null?'RSI '+w.rsi.toFixed(0):'—'}</span>
      <span style="flex:1;font-size:9px;color:var(--txt3)">${w.annVol!=null?w.annVol+'%v':''}</span>
      <span style="font-size:9px;display:flex;gap:2px">
        ${aH?'<span class="badge b-org">&#9650;HI</span>':''}
        ${aL?'<span class="badge b-org">&#9660;LO</span>':''}
        ${aRH?'<span class="badge b-dn">OB</span>':''}
        ${aRL?'<span class="badge b-up">OS</span>':''}
      </span>
      <span style="font-size:9px;color:var(--txt3);cursor:pointer;padding:0 3px" onclick="event.stopPropagation();wlDel(${i})">&#10005;</span>
    </div>`;
  }).join('');
}

function renderWLStats(){
  const wl=BB.watchlist.filter(w=>w.price);
  if(!wl.length){ document.getElementById('wl-stats').innerHTML='<div class="loading">—</div>'; return; }
  const chgs=wl.map(w=>w.chgPct??0);
  const ups=chgs.filter(c=>c>0).length,dns=chgs.filter(c=>c<0).length;
  const avg=chgs.reduce((s,c)=>s+c,0)/chgs.length;
  const alerts=BB.watchlist.filter(w=>(w.hi&&w.price>w.hi)||(w.lo&&w.price<w.lo)||(w.rhi!=null&&w.rsi>w.rhi)||(w.rlo!=null&&w.rsi<w.rlo)).length;
  const obCount=wl.filter(w=>w.rsi>70).length, osCount=wl.filter(w=>w.rsi<30).length;
  document.getElementById('wl-stats').innerHTML=`
    <div class="rm"><span class="k">TICKERS</span><span class="v wht">${BB.watchlist.length}</span></div>
    <div class="rm"><span class="k">ADVANCING</span><span class="v up">${ups}</span></div>
    <div class="rm"><span class="k">DECLINING</span><span class="v dn">${dns}</span></div>
    <div class="rm"><span class="k">AVG CHG</span><span class="v" style="color:${gc(avg)}">${fp(avg)}</span></div>
    <div class="rm"><span class="k">ALERTS</span><span class="v ${alerts?'org':'dim'}">${alerts}</span></div>
    <div class="rm"><span class="k">RSI OVERBOUGHT</span><span class="v ${obCount?'dn':'dim'}">${obCount}</span></div>
    <div class="rm"><span class="k">RSI OVERSOLD</span><span class="v ${osCount?'up':'dim'}">${osCount}</span></div>
    <div style="margin-top:8px">
      <div style="font-size:9px;color:var(--txt3);margin-bottom:3px">BREADTH</div>
      <div style="height:5px;background:var(--bdr);display:flex">
        <div style="background:var(--up);width:${(ups/wl.length*100).toFixed(0)}%;height:100%"></div>
        <div style="background:var(--dn);width:${(dns/wl.length*100).toFixed(0)}%;height:100%"></div>
      </div>
    </div>`;
}

function renderVolRank(){
  const wl=BB.watchlist.filter(w=>w.annVol!=null);
  if(!wl.length){ document.getElementById('wl-vol-rank').innerHTML='<div class="loading">—</div>'; return; }
  const sorted=[...wl].sort((a,b)=>b.annVol-a.annVol);
  const maxV=sorted[0].annVol||1;
  document.getElementById('wl-vol-rank').innerHTML=sorted.map(w=>`
    <div style="padding:3px 8px;border-bottom:1px solid rgba(46,46,46,.4);font-size:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:2px">
        <span class="wht" style="font-weight:700">${w.ticker}</span>
        <span class="yel">${w.annVol}% pa</span>
      </div>
      <div style="height:3px;background:var(--bdr)">
        <div style="height:100%;background:${w.annVol>50?'var(--dn)':w.annVol>25?'var(--org)':'var(--yel)'};width:${(w.annVol/maxV*100).toFixed(0)}%"></div>
      </div>
    </div>`).join('');
}

window.wlDel=function(i){ BB.watchlist.splice(i,1); wlRefresh(); };

window.wlLoadChart=async function(ticker){
  document.getElementById('wl-ct').textContent=' '+ticker;
  const r=await api(`/api/analytics/ohlcv/${ticker}?days=30`);
  _wlC=dc(_wlC);
  if(r.ok&&r.d.candles&&r.d.candles.length){
    const cs=r.d.candles, chg=(cs[cs.length-1].close-cs[0].close)/cs[0].close*100;
    _wlC=mkLine(document.getElementById('wl-c'),
      cs.map(c=>c.date.slice(5,10)),
      [{data:cs.map(c=>c.close),borderColor:chg>=0?'#00c853':'#f44336',borderWidth:1.5,
        pointRadius:0,fill:true,backgroundColor:chg>=0?'rgba(0,200,83,.06)':'rgba(244,67,54,.06)',tension:.2}]);
  }
};

setInterval(()=>{ if(BB.activePanel==='wl'&&BB.watchlist.length) wlRefresh(); },30000);
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════════════
     F7 EXTENDED MODULES — dense watchlist
════════════════════════════════════════════════════════════════════════ -->
<style>
.wl-tab-btn{font-family:var(--font);font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 10px;border:1px solid var(--bdr);background:transparent;color:var(--txt3);cursor:pointer}
.wl-tab-btn.on{background:var(--org);color:#000;border-color:var(--org)}
</style>

<!-- Multi-Watchlist Tabs (Module 86) -->
<div style="display:flex;align-items:center;gap:0;background:var(--bg3);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);flex-shrink:0;padding:3px 8px;gap:6px">
  <span style="font-size:9px;color:var(--txt3);letter-spacing:1.5px;margin-right:4px">LISTS:</span>
  <button class="wl-tab-btn on" id="wlt-0" onclick="wlSwitchList(0)">LIST 1</button>
  <button class="wl-tab-btn" id="wlt-1" onclick="wlSwitchList(1)">LIST 2</button>
  <button class="wl-tab-btn" id="wlt-2" onclick="wlSwitchList(2)">LIST 3</button>
  <button class="wl-tab-btn" id="wlt-3" onclick="wlSwitchList(3)">MOMENTUM</button>
  <button class="wl-tab-btn" id="wlt-4" onclick="wlSwitchList(4)">WATCHLIST 5</button>
  <!-- Sort+Filter Bar (Module 87) -->
  <!-- Add to current list (only for lists 1-4) -->
  <span id="wl-list-add" style="display:none;align-items:center;gap:4px;margin-left:8px">
    <select id="wl-list-sel" style="background:var(--bg);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--font);font-size:9px;padding:1px 3px;outline:none;min-width:120px"><option value="">SELECT TICKER</option></select>
    <button class="btn" style="font-size:9px;padding:1px 6px" onclick="wlListAddTicker()">+ ADD</button>
  </span>
  <span style="margin-left:auto;display:flex;align-items:center;gap:6px">
    <span style="font-size:9px;color:var(--txt3)">SORT</span>
    <select id="wl-sort-col" onchange="wlExtSort()" style="background:var(--bg);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--font);font-size:9px;padding:1px 3px;outline:none">
      <option value="">DEFAULT</option>
      <option value="chg">CHG%</option>
      <option value="spread">SPREAD</option>
      <option value="vol">VOLUME</option>
    </select>
    <select id="wl-exch-flt" onchange="wlExtSort()" style="background:var(--bg);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--font);font-size:9px;padding:1px 3px;outline:none">
      <option value="">ALL</option>
      <option value="NER">NER</option>
      <option value="TSE">TSE</option>
    </select>
  </span>
</div>

<!-- Dense watchlist table with all extended columns -->
<div class="wrow" style="flex:1">
  <div class="win" style="flex:2;border-right:0">
    <div class="wbar">
      <div class="wbar-l"><span class="wnum">EX1</span><span class="wtitle">ENHANCED WATCHLIST</span></div>
    </div>
    <div class="scroll" style="overflow-x:auto">
      <table class="dt" style="min-width:680px">
        <thead><tr>
          <th>TICKER</th>
          <th class="r">PRICE</th>
          <th class="r">CHG%</th>
          <th class="r">SPREAD</th>
          <th class="r">FROM H</th>
          <th class="r">FROM L</th>
          <th style="width:70px">SPARK</th>
          <th class="c">ALERT</th>
          <th>NOTE</th>
          <th>ACT</th>
        </tr></thead>
        <tbody id="wl-ext-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Quick chart unchanged -->
  <div class="win" style="flex:1">
    <div class="wbar"><div class="wbar-l"><span class="wnum">EX2</span><span class="wtitle">QUICK CHART</span></div></div>
    <div class="chart-wrap"><canvas id="wl-ext-c"></canvas></div>
  </div>
</div>

<!-- Notes editor panel -->
<div id="wl-note-editor" style="display:none;padding:6px 10px;background:var(--bg3);border-top:1px solid var(--bdr);flex-shrink:0">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="org" style="font-weight:700;font-size:11px" id="wl-note-ticker-lbl">—</span>
    <input type="text" id="wl-note-input" placeholder="Add note…" style="flex:1;background:var(--bg);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--font);font-size:11px;padding:3px 8px;outline:none">
    <button class="btn on" onclick="wlExtSaveNote()">SAVE</button>
    <button class="btn" onclick="document.getElementById('wl-note-editor').style.display='none'">✕</button>
  </div>
</div>

<script>
(function(){
// ── F7 Extended watchlist ────────────────────────────────────────────────────
let _wlLists = [[], [], [], [], []]; // 5 named lists; list 0 = main BB.watchlist
let _wlActiveList = 0;
let _wlNotes = {};
let _wlExtChart = null;
let _wlExtNoteTarget = null;

// Load notes from server
async function wlLoadNotes() {
  const r = await api('/api/watchlist/notes');
  if(r.ok) _wlNotes = r.d || {};
}
wlLoadNotes();

// Sync BB.watchlist → list 0
const _origWlRefresh = window.wlRefresh;
window.wlRefresh = async function() {
  await _origWlRefresh();
  wlExtRender();
};

window.wlSwitchList = function(idx) {
  _wlActiveList = idx;
  document.querySelectorAll('.wl-tab-btn').forEach((b,i)=>b.classList.toggle('on',i===idx));
  // Show add-ticker bar for lists 1-4
  const addBar = document.getElementById('wl-list-add');
  if(addBar) {
    addBar.style.display = idx > 0 ? 'flex' : 'none';
    // Populate the select with BB.secs
    const sel = document.getElementById('wl-list-sel');
    if(sel && idx > 0) {
      const existing = new Set((_wlLists[idx]||[]).map(w=>w.ticker));
      sel.innerHTML = '<option value="">SELECT TICKER</option>' +
        (BB.secs||[]).map(s=>`<option value="${s.ticker}"${existing.has(s.ticker)?' disabled':''} >${s.ticker}</option>`).join('');
    }
  }
  if(idx===0) { wlExtRender(); }
  else {
    const list = _wlLists[idx] || [];
    wlExtRenderList(list);
  }
};
window.wlListAddTicker = function() {
  const sel = document.getElementById('wl-list-sel');
  const ticker = sel?.value; if(!ticker) return;
  if(!_wlLists[_wlActiveList]) _wlLists[_wlActiveList] = [];
  if(_wlLists[_wlActiveList].find(w=>w.ticker===ticker)) return;
  _wlLists[_wlActiveList].push({ticker, price:null, chg_pct:null});
  wlSwitchList(_wlActiveList); // re-render
};

function wlExtRender() {
  wlExtRenderList(BB.watchlist || []);
}

function wlExtRenderList(list) {
  const tbody = document.getElementById('wl-ext-tbody'); if(!tbody) return;
  if(!list.length) { tbody.innerHTML='<tr><td colspan="10" class="loading">EMPTY LIST</td></tr>'; return; }
  const sortCol = document.getElementById('wl-sort-col')?.value || '';
  const exchFlt = document.getElementById('wl-exch-flt')?.value || '';
  let items = [...list];
  if(exchFlt) items = items.filter(w=>{
    const isTSE = w.ticker.startsWith('TSE:');
    return exchFlt==='TSE'?isTSE:!isTSE;
  });
  if(sortCol==='chg') items.sort((a,b)=>(b.chg_pct||0)-(a.chg_pct||0));
  else if(sortCol==='spread') items.sort((a,b)=>(b.spread_pct||0)-(a.spread_pct||0));
  else if(sortCol==='vol') items.sort((a,b)=>(b.volume||0)-(a.volume||0));

  tbody.innerHTML = items.map(w=>{
    const sec = (BB.secs||[]).find(s=>s.ticker===w.ticker)||{};
    const px = w.price ?? sec.market_price;
    const chg = w.chg_pct ?? sec.change_pct ?? 0;
    const hi = sec.high_24h || px;
    const lo = sec.low_24h || px;
    const fromHi = px && hi ? ((px-hi)/hi*100) : null;
    const fromLo = px && lo ? ((px-lo)/lo*100) : null;
    const hasAlert = (w.hi||w.lo||w.rhi||w.rlo) ? true : false;
    const note = _wlNotes[w.ticker] || '';
    const note_short = note.length>16 ? note.slice(0,16)+'…' : note;
    return `<tr id="wle-${w.ticker.replace(':','-')}">
      <td class="org" style="font-weight:700;cursor:pointer" onclick="wlExtLoadChart('${w.ticker}')">${w.ticker}</td>
      <td class="r wht" style="font-variant-numeric:tabular-nums">${f(px,4)}</td>
      <td class="r" style="color:${gcI(chg)};font-weight:${gcIW(chg)}">${fp(chg)}</td>
      <td class="r dim">${w.spread_pct!=null?f(w.spread_pct,3)+'%':'—'}</td>
      <td class="r ${fromHi==null?'dim':fromHi>-3?'up':'dn'}">${fromHi!=null?fp(fromHi):'—'}</td>
      <td class="r ${fromLo==null?'dim':fromLo>0?'up':'dim'}">${fromLo!=null?fp(fromLo):'—'}</td>
      <td style="width:70px"><span id="wl-spark-${w.ticker.replace(':','-')}">…</span></td>
      <td class="c">${hasAlert?'<span class="badge b-org" style="font-size:8px">ALERT</span>':'<span class="dim" style="font-size:9px">—</span>'}</td>
      <td style="font-size:9px;color:${note?'var(--cyn)':'var(--txt3)'};cursor:pointer;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onclick="wlExtEditNote('${w.ticker}')">${note_short||'+ NOTE'}</td>
      <td>
        <button class="act-b" onclick="event.stopPropagation();mktQuickOrder('${w.ticker}','buy')">B</button>
        <button class="act-s" onclick="event.stopPropagation();mktQuickOrder('${w.ticker}','sell')">S</button>
      </td>
    </tr>`;
  }).join('');
  // Load sparklines async
  items.forEach(w=>wlExtLoadSpark(w.ticker));
}

window.wlExtSort = function() { wlExtRender(); };

async function wlExtLoadSpark(ticker) {
  const id = `wl-spark-${ticker.replace(':','-')}`;
  const el = document.getElementById(id); if(!el) return;
  const r = await api(`/api/analytics/price_history/${encodeURIComponent(ticker)}?days=7`);
  if(!r.ok || !r.d.length) { el.innerHTML='—'; return; }
  const pts = r.d.sort((a,b)=>a.timestamp.localeCompare(b.timestamp)).map(p=>p.price);
  const col = pts[pts.length-1]>pts[0]?'var(--up)':'var(--dn)';
  el.innerHTML = '';
  el.appendChild(spark(pts, col, 70, 14));
}

window.wlExtLoadChart = async function wlExtLoadChart(ticker) {
  const ctx = document.getElementById('wl-ext-c'); if(!ctx) return;
  if(_wlExtChart){_wlExtChart.destroy();_wlExtChart=null;}
  const r = await api(`/api/analytics/price_history/${encodeURIComponent(ticker)}?days=30`);
  if(!r.ok||!r.d.length) return;
  const pts = r.d.sort((a,b)=>a.timestamp.localeCompare(b.timestamp));
  const col = pts[pts.length-1].price>=pts[0].price?'var(--up)':'var(--dn)';
  _wlExtChart = mkLine(ctx, pts.map(p=>p.timestamp.slice(5,10)),
    [{data:pts.map(p=>p.price),borderColor:col,borderWidth:1.5,pointRadius:0,fill:true,backgroundColor:col==='var(--up)'?'rgba(0,200,83,.06)':'rgba(244,67,54,.06)',tension:.2}]);
}

window.wlExtEditNote = function(ticker) {
  _wlExtNoteTarget = ticker;
  const inp = document.getElementById('wl-note-input');
  const lbl = document.getElementById('wl-note-ticker-lbl');
  const ed  = document.getElementById('wl-note-editor');
  if(inp) inp.value = _wlNotes[ticker] || '';
  if(lbl) lbl.textContent = ticker;
  if(ed)  ed.style.display = 'block';
  if(inp) inp.focus();
};

window.wlExtSaveNote = async function() {
  if(!_wlExtNoteTarget) return;
  const inp = document.getElementById('wl-note-input');
  const note = inp?.value || '';
  _wlNotes[_wlExtNoteTarget] = note;
  await apiPost('/api/watchlist/notes', {ticker:_wlExtNoteTarget, note});
  document.getElementById('wl-note-editor').style.display='none';
  wlExtRender();
};

// Expose mktQuickOrder if not available
if(!window.mktQuickOrder) {
  window.mktQuickOrder = function(ticker, side) {
    sw('ord');
    setTimeout(()=>{
      const tkSel=document.getElementById('op-tk');
      if(tkSel){tkSel.value=ticker;if(window.opTickerChg)opTickerChg();}
      if(window.opSide) opSide(side);
    }, 300);
  };
}

})();
</script>
