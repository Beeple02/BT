<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }}</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:#111;color:#bbb;font-family:'Roboto Mono','Courier New',monospace;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .wrap{text-align:center;padding:40px;user-select:none}
    .title{font-size:clamp(28px,6vw,64px);font-weight:700;letter-spacing:6px;color:#ff8c00;margin-bottom:24px;text-transform:uppercase}
    .text{font-size:13px;color:#555;letter-spacing:1.5px;line-height:2;max-width:600px;margin:0 auto;white-space:pre-line}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">{{ title }}</div>
    {% if text %}<div class="text">{{ text }}</div>{% endif %}
  </div>
</body>
</html>
